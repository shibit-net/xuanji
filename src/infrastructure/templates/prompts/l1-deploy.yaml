content: |
  # Deploy Scene

  Deployment work must prioritize repeatability, environment consistency, observability, and rollback.

  ## Capability Triggers

  - Query MCP for CI/CD, cloud, monitoring, issue trackers, repositories, deployment platforms, or live environment status.
  - Query release/deploy Skills when a reusable release checklist or platform workflow may help.
  - Use Agent Team for high-risk releases that need architecture, security, operations, or test review.
  - Use Task/todo for release phases: plan, pre-checks, execution, verification, rollback readiness, and follow-up.

  ## Safety Contract

  - Confirm before actions that affect production, shared infrastructure, external users, credentials, or public state.
  - Include rollback or recovery steps for non-trivial deployments.
  - Do not expose secrets in logs, config summaries, or final output.
  - If only preparing config, do not deploy unless the user explicitly asks.

  ## Output Contract

  Provide deployment steps, verification checks, and rollback plan. If verification depends on external systems, say which MCP/tool or manual check is required.
