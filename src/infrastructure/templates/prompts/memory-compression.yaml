match:
  keywords: "compression context-summary summary narrative episode"
  description: "Compress conversation history into a compact continuation summary and, when useful, a durable episode memory."
content: |
  # Context Compression Instructions

  Your task is to compress conversation history into two different outputs:

  1. A compact continuation summary that can be inserted back into the main agent context.
  2. A durable episode memory only when the conversation contains reusable personal, collaboration, or long-term context.

  Do not store detailed project progress in Memory. If the conversation contains concrete project facts, implementation progress, architecture decisions, caveats, or reusable code knowledge, note that the main agent should check or update `XUANJI.md` instead.

  ## Step 1 — Understand the Conversation

  Read the provided conversation history and identify:

  - What the user was trying to accomplish.
  - What the agent did.
  - What decisions, constraints, preferences, or feedback appeared.
  - What remains unresolved or should continue next.
  - Whether any durable project knowledge belongs in `XUANJI.md`.

  If an existing compressed summary is provided, merge the new information into it instead of starting from scratch.

  ## Step 2 — Store an Episode Only When Useful

  Store an `episode` memory only when the conversation has durable value beyond the current project files, such as:

  - A reusable collaboration pattern.
  - A user preference or long-term goal expressed through a concrete event.
  - A meaningful external commitment or life/work management context.
  - A cross-project lesson that should be remembered independently of git history.

  Do not store routine coding steps, command output, file diffs, or project progress details as an episode.

  If storing an episode, call:

  ```json
  {
    "type": "episode",
    "data": {
      "title": "Short narrative title",
      "narrative": "A coherent narrative of the durable event, written for future recall."
    }
  }
  ```

  The narrative should be readable, complete, and focused on why the event matters later. Keep it concise unless the event is unusually important.

  ## Step 3 — Produce the Continuation Summary

  Output a compact natural-language summary starting with:

  ```markdown
  ## Compressed Summary
  ```

  Preserve only information needed to continue the conversation:

  | Category | Keep |
  |----------|------|
  | Current task state | What is being done, current phase, next step |
  | Key decisions | Decisions and reasons that affect continuation |
  | User constraints | Preferences, corrections, requirements |
  | Open items | Promises, blockers, unresolved questions |
  | Project files | Only the file paths and facts needed to continue now |
  | Project knowledge write-back | Whether `XUANJI.md` should be checked or updated |

  Drop raw tool outputs, repeated confirmations, transient search logs, and intermediate states that were superseded.

  ## Output Requirements

  - Always produce the continuation summary.
  - Only store an episode when the durable-memory criteria are met.
  - Do not print the full episode narrative in the text response after storing it.
  - If project knowledge should be durable, say that `XUANJI.md` needs a write-back check instead of storing the details in Memory.

  Example summary:

  ```markdown
  ## Compressed Summary

  The user is refining Xuanji's prompt and memory boundaries. The agreed direction is: Memory stores a lightweight project pointer and user/collaboration context; concrete project facts and progress belong in `XUANJI.md`.

  Current implementation has updated the project-knowledge prompt to use a write-back check rather than mandatory updates after every task. Next step: finish scanning remaining prompt and agent templates for outdated rules or non-English prompt body text.

  `XUANJI.md` write-back check: needed if this prompt architecture decision is not already documented there.
  ```
