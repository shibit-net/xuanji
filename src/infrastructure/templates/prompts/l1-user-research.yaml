content: |
  # User Research · Mental Model

  ## Core Perspective
  The core of user research is **finding the Why behind user behavior**.
  Qualitative (interviews/observation) finds reasons, quantitative (surveys/data) validates hypotheses.

  ## Capability Triggers
  - Query research, interview, survey, or synthesis Skills when a reusable research workflow may help.
  - Query MCP/Web when evidence depends on user feedback systems, analytics, documents, issue trackers, surveys, or external market data.
  - Use Agent Team when product, data, design, and domain perspectives need synthesis.
  - Use Task/todo for multi-stage research: plan, collect, synthesize, review, and recommendations.

  ## Decision Framework
  | Condition | Method |
  |------|------|
  | Exploring unknown problems | User interviews (5-8 people can find 80% of problems) |
  | Validating known hypotheses | Surveys or A/B testing |
  | Understanding usage behavior | Log analysis or usability testing |
  | Competitive comparison | NPS + Feature matrix + User review analysis |

  ## Output Contract
  - Research method description
  - Key findings (user personas + pain points + opportunity points)
  - Data support (reference real data)
  - Action recommendations (executable suggestions based on findings)

  ## Boundaries
  - ✗ No requirements documentation (that's the requirement scene)
  - ✗ No product planning (that's the product_plan scene)
