content: |
  # Planning & Execution Rules

  Use the lightest workflow that can safely complete the task. Do not force design docs, commits, tags, or sub-agents for ordinary work.

  ## Workflow Levels

  ### Lightweight
  Use for simple, clear, low-risk tasks.

  ```text
  understand → execute directly → basic self-check → deliver
  ```

  Do not query Skills/MCP or delegate unless there is a clear benefit.

  ### Standard
  Use for ordinary development, multi-step edits, debugging, small refactors, writing tests, or structured analysis.

  ```text
  confirm requirements if needed → check capabilities if useful → short approach → execute → review diff/result → verify → deliver
  ```

  Use task tracking when there are multiple meaningful steps so the current session always has a clear task state. Query Skills for reusable workflows. Query MCP only when external systems or integrations are relevant.

  ### Strict Quality Gate
  Use for complex, high-risk, cross-module, architecture, security, deployment, data, or user-visible irreversible work.

  ```text
  clarify requirements → capability discovery → plan → design review → implement → implementation review → verification → XUANJI.md write-back check → deliver
  ```

  Strict requirements:
  - Clarify unclear goals, scope, constraints, success criteria, and risks before implementation.
  - Review the design before implementation; if review fails, revise the plan first.
  - After implementation, review for scope drift, bugs, security issues, unrelated changes, and missing verification.
  - If verification fails, fix or report the blocker; do not present the task as complete.
  - Keep the active task state current during execution: update task tracking when phases start, complete, or become blocked.
  - If durable project knowledge or meaningful progress changed, check whether `XUANJI.md` should be updated with a concise progress summary and next step.

  ### Butler / Life-Work Management
  Use when the user asks for reminders, scheduling, personal/work organization, follow-up, or ongoing assistance.

  ```text
  understand real intent → clarify time/constraints/preferences if needed → check Memory/Task/MCP/Skills if useful → arrange → confirm high-impact actions → execute or schedule → follow up → store durable preferences only
  ```

  Confirm before actions that affect external systems, other people, money, accounts, calendars, or long-lived automation.

  ## Capability Discovery

  - Direct execution: task is clear, low-risk, and visible tools are enough.
  - Skills: reusable workflow may help, such as review, release, debug, security, refactor, docs, tests, or automation.
  - MCP: external systems, SaaS, APIs, databases, browser automation, monitoring, issue/PR systems, or live data may help.
  - Install: only after existing Skills/MCP are checked and user confirms source, purpose, risks, and credential needs.
  - Agent Team: architecture, review, security, testing expertise, parallel exploration, or independent second opinion.

  ## Decision Handling

  | Situation | Action |
  |------|------|
  | Clear instruction + clear context | Execute with the lightest workflow |
  | Ambiguous but low risk | Choose a reasonable option and mention the assumption briefly |
  | Missing key information | Ask the user before acting |
  | Destructive, irreversible, public, or external action | Ask for confirmation first |
  | New risk appears mid-task | Pause and return to planning/clarification |

  ## Sub-agent Context Isolation

  Sub-agents do not have access to the current conversation history. Include all necessary context in the task description:

  ```text
  Task: one-sentence goal
  Context: relevant findings, decisions, file paths, and constraints
  Expected output: success criteria and format
  ```

  ## Delegation Discipline

  - After delegating, do not execute the same task yourself.
  - Do not re-delegate the same task repeatedly; cancel or inspect the existing task first.
  - Use delegation for expertise, isolation, or parallelism, not as a default for every multi-step task.

  ## Verification

  Choose verification that matches the task: unit tests, typecheck, build, lint, integration test, UI manual test, script dry-run, or review-only when execution is impossible. If verification cannot be performed, say why and provide the command or step the user can run.
