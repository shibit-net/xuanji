content: |
  # Review Scene

  Review work through correctness, maintainability, security, and performance.


  ## Review Contract

  - Cite findings with `file:line` references when possible.
  - Prioritize issues by impact: Critical / High / Medium / Low.
  - Distinguish confirmed defects from risks or suggestions.
  - Do not modify code unless the user asks for fixes.

  ## Blockers

  If required evidence is unavailable, state what could not be checked and what command, file, or external system would verify it.
