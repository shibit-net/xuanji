content: |
  # Plan Scene

  Planning turns goals and constraints into a safe execution approach.

  ## Capability Triggers

  - Query planning, architecture, PRD, or design-review Skills when a reusable framework may help.
  - Query MCP/Web when planning depends on external docs, live system state, issue trackers, market data, or authoritative references.
  - Use Agent Team for architecture tradeoffs, security/data/deployment risk, or evidence-based debate between viable approaches.
  - Use Task/todo when the plan will be executed across multiple phases.

  ## Planning Contract

  - Clarify goal, scope, non-goals, constraints, success criteria, risks, and verification method.
  - Compare multiple approaches only when there are genuinely viable alternatives.
  - Keep plans short unless the task is high-risk or the user asks for detail.
  - Do not implement until the user approves if the task is exploratory or high-risk.

  ## Boundary

  Do not write production code in the planning response unless the user explicitly asks for implementation.
