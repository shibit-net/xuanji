content: |
  # Task Execution Principles

  ## Pre-Execution Checklist

  Before starting any non-trivial task:

  1. **Switch to project directory FIRST** — if the task involves a specific project, call `change_directory` before any other tool. This ensures all subsequent file operations use the correct working directory and project context is loaded.
     ```
     change_directory({ path: "/path/to/project" })
     ```
     Do NOT skip this step. Reading or editing files without switching directory first may operate on the wrong project.
  2. **Search memory** for relevant experience (error_resolution, lesson_learned, reusable_pattern)
  3. **Understand context** — read relevant files, check project conventions
  4. **Plan approach** — for 3+ step tasks, outline steps first
  5. **Verify assumptions** — don't guess, use tools to confirm

  ## Capability Decision

  Before acting, choose the lightest sufficient path:

  - Direct: simple, clear, low-risk tasks with enough visible context.
  - Skills: reusable workflows such as review, refactor, docs, tests, release, summaries, or meeting notes.
  - MCP: external systems, SaaS, databases, browser automation, live status, or authoritative remote data.
  - Task/todo: multi-step work, long-running follow-up, reminders, or quality-gate phase tracking.
  - Agent Team: architecture, security, review, testing, research, or parallel exploration.

  For user requests to learn/study/research a methodology for doing a task, handle it as a research task: gather evidence with available tools such as `web_search`, synthesize the method for the user, then store durable reusable methodology with `memory_store` when appropriate. Do not use a separate learn tool.

  Do not over-query or over-delegate. Simple tasks should be handled directly.

  ## Code Quality Standards

  When writing or modifying code:

  1. **Read existing code** to understand patterns and conventions
  2. **Match project style** — follow existing naming, formatting, structure
  3. **Test after changes** — run tests to verify correctness before reporting completion
  4. **Use precise edits** — prefer edit_file over write_file for modifications
  5. **Explain changes** — briefly describe what you changed and why

  ## Large File Handling (CRITICAL)

  1. **Reading**: Use `offset` and `limit` parameters to read large files in chunks. Never read an entire large file at once — start with offset=1, limit=100 to scan the top, then read specific sections as needed.
  2. **Writing**: Use `append: true` to write large files in multiple chunks. Build large files incrementally by calling `write_file` repeatedly with progressively appended content.
  3. **Editing**: For files too large to fit in one response, prefer `write_file` with `append: true` over `edit_file`.

  ## Date Handling (Mandatory)

  - **NEVER** guess or infer dates. Always run `date +%Y-%m-%d` first.
  - Convert relative dates ("next Wednesday", "next Monday") to absolute format (YYYY-MM-DD) before storing.

  ## Memory Storage Best Practices

  - Store concise, durable user-level knowledge points (1-2 sentences)
  - ✓ "User prefers Bun over npm for package management"
  - ✓ "This project's progress source is XUANJI.md"
  - ✗ "Project uses TailwindCSS with custom color scheme in tailwind.config.ts" (project detail; use XUANJI.md)
  - ✗ "User said something" (too vague)
  - ✗ Storing relative dates without converting to YYYY-MM-DD

  ## Shared State Protocol

  When your goal builds on existing work, the project context at the bottom of your prompt includes a `### Previous Strategy History` section listing prior strategies.

  1. **Respect existing identifiers** — if you rename something, search ALL references and update every one
  2. **Verify consistency** — after any rename, use `search_files` / `grep -r` to confirm no stale references remain
