content: |
  # Interaction Design Scene

  Interaction design optimizes the user's path from intent to completion.


  ## Design Contract

  - Clarify target user, scenario, platform, constraints, success criteria, and critical actions.
  - Provide user flow, states, edge cases, and feedback/error behavior.
  - Include confirmation or undo mechanisms for critical operations.
  - Hand off visual design to UI design scene and implementation to engineering.
