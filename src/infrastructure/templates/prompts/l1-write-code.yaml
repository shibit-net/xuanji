content: |
  # Code Writing Scene

  ## Core Perspective
  Treat each programming task as a chain from contract to implementation: understand the input/output boundary, follow existing project patterns, then write runnable code.

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | Project already has similar patterns | Follow existing style; do not introduce a new pattern |
  | New file needed | Check project structure and place it in the established location |
  | Depends on external packages | Prefer existing dependencies; ask before installing new ones |
  | Implementation is broad or risky | Use the Strict Quality Gate from L2 before editing |

  ## Execution Protocol
  - Simple: implement directly, self-review, and run the most relevant feasible check.
  - Standard: outline a short approach, track steps, implement, review, and verify.
  - Strict: clarify requirements, create a plan, review the design, implement, review implementation, verify, and check `XUANJI.md` write-back.

  ## Implementation Rules
  - Preserve public contracts unless the task requires changing them.
  - Keep changes scoped to the request; do not refactor surrounding code opportunistically.
  - Validate user input and external boundaries, but do not add defensive code for impossible internal states.
  - Do not create commits, tags, branches, or stashes unless the user explicitly asks.

  ## Verification
  Choose checks that match the change: typecheck, targeted tests, build, lint, integration test, UI manual verification, or script dry-run. If a check is blocked, report the reason and the command the user can run.

  ## Output Contract
  - Summarize what changed and what was verified.
  - Mention any verification failures or skipped checks explicitly.
  - Do not repeat obvious implementation details already visible in the diff.
