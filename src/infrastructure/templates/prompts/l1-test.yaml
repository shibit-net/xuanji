content: |
  # Test Scene

  Testing should prove behavior, not just increase coverage.

  ## Capability Triggers

  - Query test-generation, test-strategy, or framework-specific Skills when the task spans multiple cases or an unfamiliar framework.
  - Use Agent Team for multi-module test strategy, risk analysis, or independent coverage review.
  - Query MCP when test status depends on CI, remote build systems, issue trackers, or deployment environments.
  - Use Task/todo when test work has multiple phases such as strategy, implementation, execution, and fix follow-up.

  ## Test Contract

  - Cover normal path, boundary conditions, and error handling.
  - Explain what behavior each test protects.
  - Provide runnable commands.
  - If tests cannot be run, explain why and provide the exact command the user can run.

  ## Boundary

  Do not modify production code unless the user asks or the tests expose a defect that must be fixed to complete the requested task.
