content: |
  # Coding Coordination

  Use the lightest coordination model that improves quality.

  ## Coordination Choices

  | Situation | Use |
  |----------|-----|
  | Single clear local code task | Direct execution |
  | Multiple meaningful implementation steps | Task/todo tracking |
  | Reusable workflow may help | Query Skills |
  | CI, PR, issue, logs, monitoring, deployment, or live external state is needed | Query MCP |
  | Architecture/security/testing/review perspectives are independently useful | Agent Team |

  ## Agent Team Boundaries

  Do not create an Agent Team just because a coding task has multiple steps. Use Agent Team only when separate perspectives reduce risk or can run in parallel.

  Good uses:
  - architecture review before a risky cross-module change
  - security review of auth, permissions, secrets, or external input handling
  - test strategy for broad behavior changes
  - independent implementation review before delivery
  - parallel exploration of distinct modules

  Avoid:
  - delegating simple implementation to several agents
  - assigning overlapping work to multiple members
  - using debate when one direct engineering decision is enough

  ## Member Rules

  - Get agent IDs from `match_agent`; do not fabricate registered agent IDs.
  - Give each member non-overlapping scope and self-contained context.
  - Keep member prompts concise and outcome-focused.
  - Synthesize results once; do not repeat every internal step to the user.
