content: |
  # Requirement Analysis Scene

  Requirements analysis clarifies who has what problem in which scenario and how success will be verified.


  ## Analysis Contract

  - Clarify goal, user, scenario, success criteria, constraints, non-goals, and risks.
  - Ask concise questions when key information is missing.
  - Separate user needs, functional requirements, and implementation constraints.
  - Output user stories and verifiable acceptance criteria when appropriate.

  ## Boundary

  Do not jump into implementation or UI design unless the user explicitly asks to proceed.
