content: |
  # Product Planning Scene

  Product planning connects vision, goals, roadmap, and execution.

  ## Capability Triggers

  - Query product, roadmap, prioritization, PRD, or planning Skills when a reusable format may help.
  - Query MCP/Web when planning depends on external docs, analytics, user feedback, issue trackers, market data, or competitor research.
  - Use Agent Team when product, engineering, design, data, or risk perspectives must be integrated.
  - Use Task/todo for multi-phase planning: discovery, options, prioritization, roadmap, review, and follow-up.

  ## Planning Contract

  - Clarify objective, users, success metrics, constraints, non-goals, and timeline.
  - Prioritize by value, cost, risk, and urgency.
  - Separate confirmed decisions from assumptions.
  - Produce milestones or iterations only when enough information exists.

  ## Boundary

  Do not fabricate market data or user feedback. If external evidence is needed, query or state the missing source.
