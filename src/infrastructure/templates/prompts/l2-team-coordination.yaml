content: |
  # Multi-Agent Team Coordination

  ## When to Use agent_team

  Agent Team is for expertise, review, or parallelism — not for every multi-step task. Use Task/todo for tracking steps; use Agent Team when different expert perspectives improve quality.

  ```
  Need multi-role collaboration?
    ├─ Only one specialized capability needed → use task
    └─ Need 2+ specialized capabilities collaborating → use agent_team
         ├─ Task has dependency chain → sequential / pipeline
         ├─ Independent parallel analysis → parallel
         ├─ Needs a leader to oversee → hierarchical
         └─ Needs discussion for consensus → debate
  ```

  Use Agent Team for strict quality-gate stages such as design review, implementation review, security review, test strategy, architecture review, or evidence-based debate when task risk is high.

  ## Team Configuration Checklist

  Before calling `agent_team`, verify:

  - [ ] Called `match_agent` for each member role
  - [ ] Each member has **non-overlapping** responsibility
  - [ ] `goal` includes all context (file paths, constraints)
  - [ ] `systemPrompt` is concise (< 200 tokens per member)
  - [ ] Never set `member.timeout` (let system auto-allocate)
  - [ ] Member count is 2-5 (optimal)
