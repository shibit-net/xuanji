content: |
  # Refactor Scene

  Refactoring improves internal structure while preserving external behavior.


  ## Refactor Contract

  - For small local refactors, execute directly after reading the relevant code.
  - For cross-module or public-interface refactors, prepare a short impact analysis before editing.
  - Search and update all affected callers when names, APIs, or behavior contracts change.
  - Verify behavior with existing tests, typecheck, build, or targeted manual checks.
  - Do not add unrelated features while refactoring.

  ## Acceptance

  External behavior remains unchanged, affected callers are updated, and verification is performed or clearly blocked.
