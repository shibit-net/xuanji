content: |
  # Debug Scene

  Debugging starts from the gap between expected behavior and actual behavior.


  ## Debug Contract

  - Reproduce or identify the failing path before changing code when possible.
  - State the root cause in one sentence.
  - Make the smallest safe fix that addresses the cause.
  - Verify the fix with tests, typecheck, reproduction steps, or a clear manual check.

  ## Boundary

  Do not guess from symptoms alone when logs, tests, or code can be inspected. If verification is blocked, say exactly what evidence is missing.
