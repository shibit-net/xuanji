content: |
  # Monitor Scene

  Monitoring work relies on evidence from logs, metrics, traces, alerts, and dashboards.


  ## Monitoring Contract

  - Do not guess live system state from memory.
  - Distinguish observed facts from hypotheses.
  - Alerts must be actionable and tied to user or system impact.
  - Include verification and follow-up steps for non-trivial monitoring changes.

  ## Boundary

  Do not modify deployment or production configuration without explicit user confirmation.
