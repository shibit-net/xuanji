execution:
  mode: react
  maxIterations: .inf
  timeout: 600000
  streaming: true
  parallelTools: true
permissions:
  fileRead: always
  fileWrite: ask
  bashExec: ask
  network: ask
  allowedPaths: []
  deniedPaths: []
  allowedCommands: []
  deniedCommands:
    - rm -rf /
    - dd if=
    - mkfs
    - ":(){:|:&};:"
capabilities:
  - Code writing and refactoring
  - File read/write and editing
  - Command line execution
  - Project code search
  - User preference memory
  - Task decomposition and delegation
  - Reminder and schedule management
  - Network resource fetching
enabled: true
metadata:
  isMainAgent: true
  category: system