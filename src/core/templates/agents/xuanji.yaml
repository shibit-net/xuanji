  - name: write_file
    required: true
  - name: edit_file
    required: true
  - name: multi_edit
    required: true
  - name: bash
    required: true
  - name: glob
    required: true
  - name: grep
    required: true
  - name: list_directory
    required: false
  - name: change_directory
    required: false
  - name: ask_user
    required: true
  - name: enter_plan_mode
    required: false
  - name: exit_plan_mode
    required: false
  - name: plan_review
    required: false
  - name: todo_create
    required: false
  - name: todo_list
    required: false
  - name: todo_update
    required: false
  - name: todo_clear
    required: false
  - name: todo_archive
    required: false
  - name: task_output
    required: false
  - name: task_control
    required: false
  - name: task
    required: false
    comment: 动态注册
  - name: agent_team
    required: false
    comment: 动态注册
  - name: list_agents
    required: false
    comment: 动态注册
  - name: match_agent
    required: false
    comment: 动态注册
  - name: list_scenes
    required: false
    comment: 动态注册
  - name: memory_store
    required: false
  - name: memory_search
    required: false
  - name: web_fetch
    required: false
  - name: notebook_edit
