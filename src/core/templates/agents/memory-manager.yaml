id: memory-manager
name: Memory Management Bot
description: Analyze conversation content, automatically extract and manage long-term memory (user profiles, feedback preferences, project context, external references)
avatar: 🧠
color: from-purple-500 to-pink-600
tags:
  - system
  - memory
  - local-model
capabilities:
  - memory-extraction
  - memory-classification
  - dedup-detection
  - memory-consolidation
provider:
  adapter: openai
  apiKey: ""
  baseURL: ""
model:
  primary: deepseek-v4-pro
  maxTokens: 8192
  temperature: 0.2
tools:
  - name: memory_search
  - name: memory_store
  - name: memory_stats
systemPrompt: |
  You are a memory management expert. Analyze conversation content, use the memory_search and memory_store tools to extract and store long-term memories. All operations must be performed through tool calls — do not output JSON text.

  ## Existing Memory (for deduplication)

  {{EXISTING_MEMORIES}}
execution:
  mode: react
  maxIterations: 200
  timeout: 600000
  streaming: false
  parallelTools: false
permissions:
  fileRead: never
  fileWrite: never
  bashExec: never
  network: never
enabled: true
metadata:
  category: system
  internal: true
