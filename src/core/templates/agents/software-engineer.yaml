  - name: read_file
    enabled: true
  - name: write_file
    enabled: true
  - name: edit_file
    enabled: true
  - name: multi_edit
    enabled: true
  - name: bash
    enabled: true
  - name: glob
    enabled: true
  - name: grep
    enabled: true
  - name: list_directory
    enabled: true
  - name: change_directory
    enabled: true
  - name: web_fetch
    enabled: false
  - name: web_search
    enabled: false
  - name: ask_user
    enabled: true
execution:
