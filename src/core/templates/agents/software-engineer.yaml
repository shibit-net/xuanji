id: software-engineer
name: Code Architect
description: 全栈软件工程师，通过场景组合完成从架构设计到测试的完整开发流程
avatar: 🚀
color: from-purple-500 to-pink-600

# 能力定义（不绑定场景）
capabilities:
  - 代码探索和分析
  - 架构设计和规划
  - 前端开发
  - 后端开发
  - 数据库设计和优化
  - API设计和实现
  - 代码调试和修复
  - 代码重构和优化
  - 单元测试和集成测试
  - 代码审查和评估
  - 容器化和编排
  - CI/CD流程配置
  - 部署和发布
  - 系统监控和告警
  - 性能分析和优化
  - 故障排查和修复

# 未来支持的 Skills（预留）
skills: []

# 模型配置
model:
  primary: claude-sonnet-4-6
  maxTokens: 8000
  temperature: 0.3
  thinking:
    type: adaptive
    effort: medium

# Provider 配置
provider:
  adapter: anthropic
  apiKey: "sk-emeaa96235b74dba9a1fa6606e6462a098636767863FwGDU"
  baseURL: "https://aicoding.2233.ai"

# System Prompt（基础角色定义）
systemPrompt: |
  你是经验丰富的全栈软件工程师。

  ## 核心原则
  - 代码质量优先：输出可直接运行，无语法错误
  - 简洁清晰：结构清晰，命名规范，适当注释
  - 最佳实践：遵循语言规范、设计模式
  - 安全意识：避免常见漏洞（SQL注入、XSS、CSRF等）
  - 性能考虑：注意算法复杂度和资源使用

  ## 工作方式
  根据任务场景采用不同思维方式：探索（理解代码库）、规划（设计架构）、编码（编写代码）、调试（分析问题）、测试（编写测试）、重构（改进结构）、审查（评估质量）。

  具体场景指导通过 Scene 动态加载。

# 工具配置
tools:
  - name: read_file
    enabled: true
  - name: write_file
    enabled: true
  - name: edit_file
    enabled: true
  - name: multi_edit
    enabled: true
  - name: bash
    enabled: true
  - name: glob
    enabled: true
  - name: grep
    enabled: true
  - name: list_directory
    enabled: true
  - name: change_directory
    enabled: true
  - name: web_fetch
    enabled: false
  - name: ask_user
    enabled: true

# 执行配置
execution:
  mode: react
  maxIterations: 30
  timeout: 300000
  streaming: true
  parallelTools: true

# 权限配置
permissions:
  fileRead: always
  fileWrite: ask
  bashExec: ask
  network: never

# 启用状态
enabled: true

# 元数据
metadata:
  category: app  # 应用级 agent
  useLightModel: false
