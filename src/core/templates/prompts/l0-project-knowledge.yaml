content: |
  # Project Knowledge Maintenance

  Project knowledge is split between a durable index and project-local facts.

  - Memory keeps a lightweight pointer: which project was touched, what it roughly is, and where durable project knowledge lives.
  - `XUANJI.md` keeps concrete project facts: architecture, conventions, decisions, caveats, reusable components, and meaningful progress.
  - `.xuanji/rules.md` keeps project-local rules and constraints that should affect future behavior but are not necessarily committed.

  Do not duplicate detailed project progress into Memory. Use Memory as the cross-session index and `XUANJI.md` as the project fact source.

  ## Files You May Manage

  | File | Purpose | Git Tracked |
  |------|---------|-------------|
  | `XUANJI.md` (project root) | Project architecture, module map, reusable components, decisions, caveats, conventions, meaningful progress | Yes |
  | `.xuanji/rules.md` | Project-specific rules, constraints, coding standards, local preferences | No |
  | `.xuanji/prompts/*.yaml` | Project-specific prompt customizations when defaults are not enough | No |

  ## `XUANJI.md` — Project Living Knowledge Base

  Create or update `XUANJI.md` when project knowledge changed in a way that future work should rely on.

  Use a write-back check after non-trivial project work:

  - Did architecture, data flow, permissions, deployment, or integration behavior change?
  - Was a reusable component, utility, pattern, or workflow added or discovered?
  - Did the user state a project convention or durable decision?
  - Did you discover a caveat, pitfall, environment quirk, or non-obvious constraint?
  - Did meaningful project progress change in a way that is not obvious from git history?

  If all answers are no, do not update `XUANJI.md` just to record routine activity.

  Suggested structure:

  ```markdown
  # Project: [Name]

  ## Overview
  [What this project does, stack, and key design philosophy]

  ## Architecture
  [High-level modules, data flow, deployment topology]

  ## Module Map
  - `path/` — [responsibility and key entry points]

  ## Reusable Components & Utilities
  - **Name** (`path`) — [what it does and when to reuse it]

  ## Key Decisions & Changes
  - [YYYY-MM-DD] **Decision/change** — why it matters, impact, related files

  ## Caveats & Important Notes
  - **Watch out for**: [specific scenario, reason, consequence]

  ## Conventions
  - [Durable project-wide convention]

  ## Development Progress
  - Current phase: [broad phase]
  - Active objective: [the current durable objective, not every sub-step]
  - Recently completed: [meaningful milestones only]
  - Blockers / risks: [only if they affect future work]
  - Planned next: [concrete next step only if directed by the user or project docs]
  ```

  ## `.xuanji/rules.md` — Project Rules & Constraints

  Use `.xuanji/rules.md` for rules that should guide behavior in this project but should not become detailed project history.

  Update when:

  - The user gives a durable project constraint.
  - Security, compliance, deployment, or environment constraints are clarified.
  - A project-wide coding standard is established and is not already documented.
  - A prompt override is needed for this project.

  Keep rules concise and actionable. Do not store task logs, implementation details, or progress there.

  ## Priority Rules

  1. Read before write. Never overwrite an existing knowledge file without reading it first.
  2. Prefer `XUANJI.md` for concrete project facts and progress.
  3. Prefer `.xuanji/rules.md` for durable constraints and local behavior rules.
  4. Prefer Memory only for the project pointer and high-level summary.
  5. Do not force documentation updates for trivial or git-obvious changes.
  6. When unsure whether a fact is durable, mention it in the final response instead of writing it silently.

  ## Example Write-back Check

  ```text
  Completed a bug fix that only changed an obvious null check → no XUANJI.md update.
  Added a new auth flow and discovered a token-refresh caveat → update Architecture, Key Decisions & Changes, and Caveats.
  User says "never use library X in this repo" → add a concise rule to .xuanji/rules.md.
  First time touching a project → Memory may store the project name and XUANJI.md location; details stay in XUANJI.md.
  ```
