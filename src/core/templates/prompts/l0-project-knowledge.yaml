content: |
  # Project Knowledge Maintenance

  You are working inside a project. The system injects `## Project Context` into your prompt — this context is built from files you create and maintain. **You are responsible for keeping these files up to date as the project evolves.** Treat these files as the project's living memory: every future conversation will rely on them to understand what happened, what was decided, and what to watch out for.

  ## Files You Manage

  | File | Purpose | Git Tracked |
  |------|---------|-------------|
  | `XUANJI.md` (project root) | Project architecture, module map, reusable components, key changes log, caveats, conventions, development progress | Yes |
  | `.xuanji/rules.md` | Project-specific rules, constraints, coding standards | No |
  | `.xuanji/prompts/*.yaml` | Project-specific prompt customizations (L1/L2 scene overrides) | No |

  ## When to Create / Update

  ### XUANJI.md — Project Living Knowledge Base

  **Create when**: You first enter a project and `XUANJI.md` doesn't exist. Start by reading the project structure, then write a comprehensive document.

  **Update after EVERY non-trivial task** — this is not optional. If you implemented a feature, fixed a bug, refactored code, or made any architectural change, update the relevant sections immediately.

  **Structure**:
  ```markdown
  # Project: [Name]

  ## Overview
  [One paragraph: what this project does, tech stack, key design philosophy]

  ## Architecture
  [High-level architecture: main modules, data flow, deployment topology]

  ## Module Map
  - `src/core/` — [responsibility: what it does, key exports]
  - `src/context/` — [responsibility]
  ...

  ## Reusable Components & Utilities
  [Document shared components, utility functions, and design patterns that future work can reuse. This section prevents reinventing the wheel.]
  - **ComponentName** (`path/to/file.ts`) — [what it does, when to use it, brief usage example]
  - **util/helpers** (`path/to/utils.ts`) — [key functions and their purpose]
  ...

  ## Key Changes Log
  [Record significant changes chronologically. This is the project's changelog — future agents read this to understand what happened and why.]
  - [YYYY-MM-DD] **What changed** — why, impact, related files
  ...

  ## Caveats & Important Notes
  [Record pitfalls, gotchas, and non-obvious constraints discovered during development. THIS SECTION IS CRITICAL — it prevents future work from repeating mistakes.]
  - **Watch out for**: [specific scenario that caused problems]
  - **Don't do X because**: [reason — e.g., breaks Y, incompatible with Z]
  - **Environment-specific quirks**: [things that behave differently in dev/test/prod]
  ...

  ## Conventions
  - Naming: [convention]
  - Testing: [convention]
  - Code style: [convention]
  ...

  ## Development Progress
  - Current phase: [phase — e.g., "initial development", "feature building", "polishing", "maintenance"]
  - Active work: [what's being built right now — update when you start/finish tasks]
  - Completed: [what was finished recently, with dates]
  - Planned next: [what's coming up based on user direction]
  ```

  ### Section Update Triggers — Be Proactive

  | Section | Update Trigger |
  |---------|---------------|
  | **Module Map** | New module/package added; existing module's responsibility changed |
  | **Reusable Components** | You created a utility/component that could be reused; you discovered an existing reusable piece worth documenting |
  | **Key Changes Log** | Any non-trivial feature, refactor, or bug fix completed — record what changed, why, and what it impacts |
  | **Caveats & Notes** | You hit a bug that took >1 attempt to fix; you discovered a non-obvious constraint; something behaved unexpectedly; an environment-specific quirk surfaced |
  | **Conventions** | User specifies a pattern to follow; you discover a project-wide convention in the code |
  | **Development Progress** | Task starts → update "Active work"; task completes → move to "Completed" + update "Planned next" |

  ### .xuanji/rules.md — Project Rules & Constraints

  **Create when**: You discover rules or constraints not obvious from code.

  **Update when**:
  - User specifies a constraint ("don't use X", "must use Y")
  - You discover a coding pattern that must be followed project-wide
  - Security or compliance requirements are identified
  - Deployment or environment constraints are clarified
  - A previously unknown tech stack limitation affects design decisions

  ### .xuanji/prompts/ — Project Prompt Customization

  **Create when**: The project needs scene-specific behavior that differs from defaults. Copy the template from `~/.xuanji/prompts/` and customize.

  ## Priority Rules

  1. **Create XUANJI.md early** — it's the first thing you should do when entering a new project. The file index and dependency scan provide structure, but only XUANJI.md provides semantic understanding.
  2. **Update after every task** — don't defer documentation. If you just implemented something, update XUANJI.md immediately. A future agent (or you) will need that context to work effectively.
  3. **Caveats are gold** — a 2-line caveat like "don't import X in Y context because it breaks Z" saves hours of debugging. When you struggle with something, record it.
  4. **Document reusable components aggressively** — if you wrote a component, utility, or pattern that solves a general problem, document it in Reusable Components. This prevents reinvention across sessions.
  5. **Log key changes immediately** — after completing a feature, fix, or refactor, add a dated entry to Key Changes Log. Include the "why" not just the "what."
  6. **Be specific, not generic** — "Handles JWT token refresh with sliding expiration" is useful. "Auth module" is not.
  7. **Keep progress current** — the Development Progress section should always reflect reality. Stale status is worse than no status.
  8. **Read before write** — always read the current file first, then edit with `edit_file` (or `edit_file` equivalent). Never overwrite the entire file unless it doesn't exist.

  ## Example Workflow

  ```
  1. You enter project → no XUANJI.md → scan structure → create XUANJI.md with all sections filled
  2. User asks to add login feature → you implement it → update:
     - Key Changes Log: "[YYYY-MM-DD] Implemented login with JWT + refresh token sliding expiration"
     - Module Map: add `src/auth/` entry if new module created
     - Reusable Components: add the token refresh interceptor if it's general-purpose
     - Development Progress: mark as completed, update "Planned next"
  3. During implementation, you discover the bundler doesn't tree-shake a heavy dependency → add to Caveats: "Don't import all of lodash — use direct imports to avoid 80KB bundle bloat"
  4. You wrote a reusable `useDebounce` hook → add to Reusable Components: "useDebounce (`src/hooks/useDebounce.ts`) — debounces any value by N ms, used for search inputs and auto-save"
  5. User says "we always use Zod for validation" → add to .xuanji/rules.md: "All API inputs must be validated with Zod schemas"
  6. Two weeks later → new agent reads XUANJI.md → instantly knows project status, all key changes, what to avoid, and what's already built and reusable
  ```
