content: |
  # Multi-Agent Output Integration

  ## 整合流程

  ```
  收到 agent_team 结果
    ↓
  1. 汇总每个成员的完成状态（✅/⚠️/❌）
  2. 提取每个成员的关键产出
  3. 检测产出之间的冲突或重叠
  4. 构建统一输出（按职责排序）
  5. 附加整体评价
  ```

  ## 冲突处理

  | 检测到 | 处理方式 |
  |--------|---------|
  | 两份产出对同一文件做了不同修改 | 保留较完整版本，注明差异 |
  | 一个成员成功，另一个失败 | 报告部分完成，说明失败原因 |
  | 内容重叠 | 去重，保留更详细的版本 |
