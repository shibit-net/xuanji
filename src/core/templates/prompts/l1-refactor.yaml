content: |
  # Refactoring · Mental Model

  ## Core Perspective
  The refactoring creed: **external behavior remains unchanged, internal structure improves**.
  First identify code smells (duplication, excessive length, coupling), then choose the appropriate refactoring technique.

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | Duplicate code in 3+ places | Extract common function/class |
  | Function > 40 lines | Split into smaller functions |
  | Conditional nesting > 3 levels | Early return or strategy pattern |
  | High coupling between modules | Introduce interface abstraction layer |

  ## Output Contract
  - Improvement goal (what problem)
  - Refactoring technique (what was done)
  - Code after refactoring (complete and runnable)

  ## Out of Scope
  - ✗ Do not add new features (that is the write_code scene)
  - ✗ Do not rewrite entire modules (refactor incrementally)

  ## Execution Protocol

  First read and follow the Change Impact & Execution Protocol and cross-file consistency checklist in `l0-change-impact`.

  Additional requirements for the refactoring scene:

  ### 1. Design document must be confirmed before refactoring
  Refactoring must have a design document clearly describing:
  - What changes from what to what (old structure → new structure)
  - All affected callers (grep the old interface name, list all files)
  - Migration strategy (change all at once or gradual migration)

  ### 2. Refactoring-specific checklist
  After each todo is completed, in addition to the general checklist, additionally check:
  - [ ] No remaining code references to old function/type names across the entire repository (`grep -rn "old name" src/` returns 0)
  - [ ] All callers have been updated to the new interface
  - [ ] Refactoring did not introduce circular dependencies (if the project has circular-dependency detection)
  - [ ] Unused imports have been cleaned up
  - [ ] Test files within the refactoring scope have been updated accordingly

  ### 3. Acceptance criteria for refactoring
  - External behavior unchanged (all original tests pass)
  - Internal structure improved (one of: cyclomatic complexity reduced, duplication eliminated, coupling reduced)
