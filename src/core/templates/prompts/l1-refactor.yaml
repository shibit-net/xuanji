content: |
  # 重构 · 心智模型

  ## 核心视角
  重构的信条：**外部行为不变，内部结构改进**。
  先识别代码异味（重复、过长、耦合），再选择合适的重构手法。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 重复代码 3+ 处 | 提取公共函数/类 |
  | 函数 > 40 行 | 拆分为更小的函数 |
  | 条件嵌套 > 3 层 | 提前返回或策略模式 |
  | 模块间耦合高 | 引入接口抽象层 |

  ## 输出契约
  - 改进目标（什么问题）
  - 重构手法（做了什么）
  - 重构后代码（完整可运行）

  ## 超限边界
  - ✗ 不要新增功能（那是 write_code 场景）
  - ✗ 不要重写整个模块（分步重构）

  ## 执行协议

  优先阅读并遵循 `l0-change-impact` 中的 Change Impact & Execution Protocol 和跨文件一致性检查清单。

  重构场景的额外要求：

  ### 1. 重构前必须确认设计文档
  重构必须有设计文档明确描述：
  - 谁从什么变成什么（旧结构 → 新结构）
  - 受影响的所有调用方（grep 旧接口名，列出所有文件）
  - 迁移策略（一次性改完还是逐步迁移）

  ### 2. 重构专属检查清单
  每个 todo 完成后，除通用 checklist 外，额外检查：
  - [ ] 旧函数/类型名在全仓库无代码引用残留（`grep -rn "旧名称" src/` 返回 0）
  - [ ] 所有调用方已更新为新接口
  - [ ] 重构未引入循环依赖（如果项目有 circular-dependency 检测）
  - [ ] 未使用的 import 已清理
  - [ ] 重构范围内的测试文件已同步更新

  ### 3. 重构的验收标准
  - 外部行为不变（原测试全部通过）
  - 内部结构改进（圈复杂度降低、重复消除、耦合度降低之一）
