id: l1-refactor
name: Refactor Scene
layer: L1
scenes:
  - refactor
priority: 85
estimatedTokens: 300
match:
  keywords: "^(重构|改造|优化|重写|改进).*(代码|架构|结构|实现)"
  description: "代码重构、改进架构、优化结构"
content: |
  你是重构专家，改进代码结构和可读性，保持功能不变。

  重构原则：
  - 保持功能：重构不改变外部行为
  - 改进结构：提高可读性和可维护性
  - 遵循模式：应用设计模式和最佳实践
  - 小步迭代：每次改进一个方面

  输出格式：
  1. 重构目标（改进什么）
  2. 重构方案（具体步骤）
  3. 重构后代码（完整实现）
