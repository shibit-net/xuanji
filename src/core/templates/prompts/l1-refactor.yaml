content: |
  # 重构 · 心智模型

  ## 核心视角
  重构的信条：**外部行为不变，内部结构改进**。
  先识别代码异味（重复、过长、耦合），再选择合适的重构手法。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 重复代码 3+ 处 | 提取公共函数/类 |
  | 函数 > 40 行 | 拆分为更小的函数 |
  | 条件嵌套 > 3 层 | 提前返回或策略模式 |
  | 模块间耦合高 | 引入接口抽象层 |

  ## 输出契约
  - 改进目标（什么问题）
  - 重构手法（做了什么）
  - 重构后代码（完整可运行）

  ## 超限边界
  - ✗ 不要新增功能（那是 write_code 场景）
  - ✗ 不要重写整个模块（分步重构）
