content: |
  # Interaction Design Scene

  Interaction design optimizes the user's path from intent to completion.

  ## Capability Triggers

  - Query design, UX, user-journey, or prototyping Skills when a reusable framework may help.
  - Query MCP/Web when design depends on product docs, design systems, analytics, user feedback, or external references.
  - Use Agent Team when product, design, engineering, and accessibility perspectives need review.
  - Use Task/todo for multi-screen flows or iterative design review.

  ## Design Contract

  - Clarify target user, scenario, platform, constraints, success criteria, and critical actions.
  - Provide user flow, states, edge cases, and feedback/error behavior.
  - Include confirmation or undo mechanisms for critical operations.
  - Hand off visual design to UI design scene and implementation to engineering.
