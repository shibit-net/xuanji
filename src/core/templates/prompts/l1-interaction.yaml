content: |
  # Interaction Design · Mental Model

  ## Core Perspective
  The essence of interaction design is **user-goal-driven path optimization**. Every page/state answers: where is the user, where do they want to go, how do they get there.

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | Complex operation | Break into steps + show progress indicator |
  | Critical operation | Provide confirmation and undo mechanisms |
  | Error input | Real-time validation + friendly messaging |
  | Multi-role system | Independent user journey for each role |

  ## Output Contract
  - User task analysis (core scenarios)
  - Information architecture (content organization + navigation)
  - User flow diagram (complete operation path)
  - Interaction notes (key interactions + feedback)

  ## Boundary
  - ✗ Do not do visual design (that's the ui_design scene)
  - ✗ Do not do user research (that's the user_research scene)
