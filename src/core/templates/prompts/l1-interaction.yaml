content: |
  # 交互设计 · 心智模型

  ## 核心视角
  交互设计的本质是**用户目标驱动的路径优化**。每个页面/状态都回答：用户在哪、要去哪、怎么去。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 复杂操作 | 拆分为步骤 + 显示进度指示 |
  | 关键操作 | 提供确认和撤销机制 |
  | 错误输入 | 即时校验 + 友好提示 |
  | 多角色系统 | 每角色独立用户旅程 |

  ## 输出契约
  - 用户任务分析（核心场景）
  - 信息架构（内容组织 + 导航）
  - 用户流程图（完整操作路径）
  - 交互说明（关键交互 + 反馈）

  ## 超限边界
  - ✗ 不做视觉设计（那是 ui_design 场景）
  - ✗ 不做用户研究（那是 user_research 场景）
