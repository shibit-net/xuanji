content: |
  # 交互设计场景

  ## 核心原则
  - **用户目标**：帮助用户高效完成任务
  - **清晰反馈**：每个操作都有明确反馈
  - **容错性**：允许用户犯错并提供补救
  - **一致性**：相似的操作有相似的交互

  ## 工作流程
  1. 理解用户任务（用户要完成什么）
  2. 设计信息架构（内容组织和导航）
  3. 绘制用户流程（从入口到完成的路径）
  4. 设计交互细节（点击、滑动、反馈）
  5. 制作原型（低保真或高保真）
  6. 验证可用性（测试和优化）

  ## 输出格式
  1. **用户任务**：核心任务和使用场景
  2. **信息架构**：内容组织和导航结构
  3. **用户流程图**：完整的操作路径
  4. **交互说明**：关键交互的详细描述
  5. **原型描述**：界面结构和交互方式
  6. **可用性建议**：潜在问题和优化方向
