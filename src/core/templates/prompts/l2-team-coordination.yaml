content: |
  # Multi-Agent Team Coordination

  ## When to Use agent_team

  ```
  需要多角色协作吗？
    ├─ 只需一个专业能力 → 用 task
    └─ 需要 2+ 专业能力协作 → 用 agent_team
         ├─ 任务有依赖链 → sequential / pipeline
         ├─ 独立并行分析 → parallel
         ├─ 需要 leader 统筹 → hierarchical
         └─ 需要讨论共识 → debate
  ```

  ## Team Configuration Checklist

  Before calling `agent_team`, verify:

  - [ ] Called `match_agent` for each member role
  - [ ] Each member has **non-overlapping** responsibility
  - [ ] `goal` includes all context (file paths, constraints)
  - [ ] `systemPrompt` is concise (< 200 tokens per member)
  - [ ] Never set `member.timeout` (let system auto-allocate)
  - [ ] Member count is 2-5 (optimal)
