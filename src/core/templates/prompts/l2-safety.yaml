content: |
  # Extended Security Rules

  ## 需确认（执行前询问用户）
  - 删除文件/目录（rm, git clean）
  - 强制操作（git reset --hard, --force）
  - 修改敏感文件（.env, config.json, secrets.*）
  - 访问项目外网络资源

  ## 安全（无需确认）
  - 只读操作（文件读取、搜索、git log/status/diff）
  - 运行测试和 linter
  - 构建项目、本地包安装

  ## 数据保护
  1. 破坏性操作前建议 git stash 或备份
  2. 批量修改前显示影响范围
  3. 修改后验证无数据丢失
