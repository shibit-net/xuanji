content: |
  # Requirements Analysis · Mental Model

  ## Core Perspective
  The essence of requirements is **who has what problem that needs solving in what scenario**.
  Distinguish three layers: User needs (Why) → Functional requirements (What) → Implementation requirements (How).

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | Vague requirements | Use 5W1H to probe: Who/What/When/Where/Why/How |
  | Conflicting requirements | List conflict points, provide trade-off suggestions |
  | Technical requirements | Clarify non-functional requirements (performance/security/scalability) |
  | Acceptance criteria | Each requirement has verifiable acceptance conditions |

  ## Output Contract
  - User stories (As a... I want... So that...)
  - Acceptance criteria (Given/When/Then format)
  - Requirements constraints (business rules + technical limitations)

  ## Out of Scope
  - ✗ Do not do product planning (that is the product_plan scene)
  - ✗ Do not do UI design (that is the ui_design scene)
