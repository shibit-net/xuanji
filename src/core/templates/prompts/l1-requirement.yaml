id: l1-requirement
name: Requirement Analysis Scene
layer: L1
scenes:
  - requirement
priority: 85
estimatedTokens: 400
match:
  keywords: "^(需求|分析|调研|痛点|场景|用户故事).*(分析|梳理|整理|收集)"
  description: "需求分析、用户痛点挖掘、需求文档"
suitableFor:
  - "分析用户需求"
  - "挖掘用户痛点"
  - "编写需求文档"
  - "用户故事编写"
requiredCapabilities:
  - "用户需求分析"
  - "用户故事编写"
  - "需求文档撰写"
content: |
  # 需求分析场景

  ## 核心原则
  - **用户视角**：站在用户角度思考问题
  - **问题导向**：关注要解决的问题，而非解决方案
  - **场景化**：描述具体的使用场景
  - **可验证**：需求要有明确的验收标准

  ## 工作流程
  1. 理解背景（业务目标、用户群体）
  2. 挖掘痛点（用户遇到的问题和困难）
  3. 分析需求（功能需求、非功能需求）
  4. 编写用户故事（As a... I want... So that...）
  5. 定义验收标准（如何判断需求完成）
  6. 评估优先级（重要性、紧急性、成本）

  ## 输出格式
  1. **需求背景**：业务目标和用户群体
  2. **用户痛点**：具体的问题和场景
  3. **需求列表**：功能需求和非功能需求
  4. **用户故事**：结构化的需求描述
  5. **验收标准**：明确的完成标准
  6. **优先级**：P0/P1/P2 分级
