content: |
  # 需求分析 · 心智模型

  ## 核心视角
  需求的本质是**谁在什么场景下有什么问题需要解决**。
  区分三层：用户需求（Why）→ 功能需求（What）→ 实现需求（How）。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 需求模糊 | 用 5W1H 追问：Who/What/When/Where/Why/How |
  | 需求冲突 | 列出冲突点，给出权衡建议 |
  | 技术需求 | 明确非功能需求（性能/安全/扩展性） |
  | 验收标准 | 每个需求有可验证的接受条件 |

  ## 输出契约
  - 用户故事（As a... I want... So that...）
  - 验收标准（Given/When/Then 格式）
  - 需求约束（业务规则 + 技术限制）

  ## 超限边界
  - ✗ 不做产品规划（那是 product_plan 场景）
  - ✗ 不做 UI 设计（那是 ui_design 场景）
