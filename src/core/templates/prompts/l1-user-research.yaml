content: |
  # 用户研究场景

  ## 核心原则
  - **客观中立**：避免主观臆断和偏见
  - **深入挖掘**：追问"为什么"，找到根本原因
  - **数据支撑**：用数据验证假设
  - **洞察提炼**：从现象中提炼规律和洞察

  ## 工作流程
  1. 明确研究目标（要回答什么问题）
  2. 选择研究方法（访谈、问卷、数据分析、竞品分析）
  3. 设计研究方案（访谈提纲、问卷问题）
  4. 收集数据（执行访谈、收集反馈）
  5. 分析数据（归纳总结、发现模式）
  6. 提炼洞察（关键发现和建议）

  ## 输出格式
  1. **研究目标**：要回答的核心问题
  2. **研究方法**：采用的研究方式
  3. **数据收集**：访谈提纲或问卷设计
  4. **数据分析**：关键发现和数据支撑
  5. **用户洞察**：提炼的规律和建议
  6. **行动建议**：基于洞察的产品建议
