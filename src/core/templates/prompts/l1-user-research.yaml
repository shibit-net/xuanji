content: |
  # 用户研究 · 心智模型

  ## 核心视角
  用户研究的核心是**找到用户行为背后的 Why**。
  定性（访谈/观察）找原因，定量（问卷/数据）验证假设。

  ## 决策框架
  | 条件 | 方法 |
  |------|------|
  | 探索未知问题 | 用户访谈（5-8 人即可发现 80% 问题） |
  | 验证已知假设 | 问卷调查或 A/B 测试 |
  | 理解使用行为 | 日志分析或可用性测试 |
  | 竞品对比 | NPS + 功能矩阵 + 用户评价分析 |

  ## 输出契约
  - 研究方法说明
  - 关键发现（用户画像 + 痛点点 + 机会点）
  - 数据支撑（引用真实数据）
  - 行动建议（基于发现的可执行建议）

  ## 超限边界
  - ✗ 不做需求文档（那是 requirement 场景）
  - ✗ 不做产品规划（那是 product_plan 场景）
