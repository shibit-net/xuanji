id: l1-deploy
name: Deploy Scene
layer: L1
scenes:
  - deploy
priority: 85
estimatedTokens: 400
match:
  keywords: "^(部署|发布|上线|配置|容器化|docker|k8s|kubernetes|ci|cd).*(环境|服务器|生产|测试)"
  description: "部署配置、容器化、CI/CD流程"
suitableFor:
  - "配置部署流程"
  - "容器化应用"
  - "CI/CD流程搭建"
  - "环境配置"
requiredCapabilities:
  - "容器化和编排"
  - "CI/CD流程配置"
  - "部署和发布"
content: |
  # 部署配置场景

  ## 核心原则
  - **自动化优先**：尽可能自动化部署流程
  - **环境一致性**：开发、测试、生产环境保持一致
  - **可回滚**：支持快速回滚到上一版本
  - **安全性**：保护敏感信息，使用密钥管理

  ## 工作流程
  1. 分析部署需求（目标环境、依赖服务）
  2. 选择部署方案（Docker、K8s、传统部署）
  3. 编写配置文件（Dockerfile、docker-compose.yml、k8s manifests）
  4. 配置CI/CD（GitHub Actions、GitLab CI、Jenkins）
  5. 测试部署流程（在测试环境验证）
  6. 文档化部署步骤

  ## 输出格式
  1. **部署方案**：选择的技术栈和理由
  2. **配置文件**：完整的部署配置
  3. **部署步骤**：详细的操作说明
  4. **回滚方案**：出问题时如何回滚
