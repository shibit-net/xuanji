content: |
  # Deploy · Mental Model

  ## Core Perspective
  Basic principles of deployment: **Automation first, environment consistency, rollback capability**.
  Separate configuration from code, manage sensitive information with secrets management.

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | Single service | Docker + docker-compose first |
  | Multi-service / Microservice | K8s manifests + Ingress |
  | CI/CD pipeline | Start configuring from the most time-consuming build step |
  | Environment differences | Manage with environment variables + .env file |

  ## Output Contract
  - Deployment plan (tech stack + rationale)
  - Configuration files (complete and runnable)
  - Deployment steps (in order)
  - Rollback plan

  ## Boundary
  - ✗ Do not modify application code
  - ✗ Do not handle monitoring alert configuration (that's the monitor scene)
