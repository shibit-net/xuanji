content: |
  # 部署配置 · 心智模型

  ## 核心视角
  部署的基本原则：**自动化优先，环境一致性，可回滚**。
  配置与代码分离，敏感信息用密钥管理。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 单服务 | Docker + docker-compose 优先 |
  | 多服务/微服务 | K8s manifests + Ingress |
  | CI/CD 流程 | 从最耗时的构建步骤开始配置 |
  | 环境差异 | 用环境变量 + .env 文件管理 |

  ## 输出契约
  - 部署方案（技术栈 + 理由）
  - 配置文件（完整可运行）
  - 部署步骤（按顺序）
  - 回滚方案

  ## 超限边界
  - ✗ 不修改应用代码
  - ✗ 不处理监控告警配置（那是 monitor 场景）
