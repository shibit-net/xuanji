content: |
  # UI设计场景

  ## 核心原则
  - **视觉层次**：通过大小、颜色、位置建立层次
  - **对齐和间距**：保持整齐和呼吸感
  - **色彩系统**：建立清晰的色彩语义
  - **字体排版**：提高可读性和美感

  ## 工作流程
  1. 确定设计风格（简约、扁平、拟物等）
  2. 建立色彩系统（主色、辅助色、语义色）
  3. 定义字体规范（字号、字重、行高）
  4. 设计布局网格（栅格系统、间距规范）
  5. 设计组件（按钮、输入框、卡片等）
  6. 适配不同尺寸（响应式设计）

  ## 输出格式
  1. **设计风格**：整体风格定位和参考
  2. **色彩系统**：主色、辅助色、语义色定义
  3. **字体规范**：字号、字重、行高体系
  4. **布局系统**：栅格、间距、断点规范
  5. **组件设计**：关键组件的视觉设计
  6. **设计说明**：设计决策和使用指南
