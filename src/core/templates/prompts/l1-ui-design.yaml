content: |
  # UI Design · Mental Model

  ## Core Perspective
  Good UI = **Visual Hierarchy × Consistency × Usability**. From far to near: overall layout → components → pixel details.

  ## Capability Triggers
  - Query design/UI Skills when a reusable visual, accessibility, or design review workflow may help.
  - Query MCP/Web when design depends on product docs, design systems, brand guidelines, analytics, or external references.
  - Use Agent Team when product, interaction, UI, accessibility, and engineering constraints need review.
  - Use Task/todo for multi-screen design or iterative review.

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | New interface | First determine layout structure (navigation/content/action area) |
  | Color scheme | Primary/accent/semantic colors, use HSL for tuning |
  | Typography | Establish type scale (12/14/16/20/24/32) |
  | Responsive | Mobile-first, define breakpoints |

  ## Output Contract
  - Design style positioning + references
  - Color system (primary/accent/semantic colors)
  - Typography specs (font size/weight/line height)
  - Layout system (grid/spacing/breakpoints)

  ## Boundaries
  - ✗ No interaction design (that's the interaction scene)
  - ✗ No design system construction (that's the design_system scene)
