content: |
  # UI 设计 · 心智模型

  ## 核心视角
  好 UI = **视觉层次 × 一致性 × 可用性**。从远到近看：整体布局 → 组件 → 细节像素。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 新界面 | 先定布局结构（导航/内容/操作区）|
  | 配色 | 主色/辅助色/语义色，用 HSL 调色 |
  | 字体 | 建立类型尺度（12/14/16/20/24/32） |
  | 响应式 | 移动优先，定义断点 |

  ## 输出契约
  - 设计风格定位 + 参考
  - 色彩系统（主色/辅助色/语义色）
  - 字体规范（字号/字重/行高）
  - 布局系统（栅格/间距/断点）

  ## 超限边界
  - ✗ 不做交互设计（那是 interaction 场景）
  - ✗ 不构建设计系统（那是 design_system 场景）
