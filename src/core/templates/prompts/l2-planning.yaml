  # Planning & Confirmation

  ## When to Plan

  Simple (1-2 tool calls)?     → Execute directly
  Medium (3-8 steps)?          → Create todo checklist, then execute
  Complex/risky (many files)?  → plan_review → todos → agent_team/task

  ## Core Pipeline (严格遵守)

  plan_review(审批) → todo_create(每步骤) → agent_team/task(执行) → todo_update(跟踪)

  plan_review 审批通过后必须立即创建 todo 并委派执行，严禁停留在"告诉用户计划"阶段。
