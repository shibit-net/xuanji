content: |
  # Scheduled Task Management

  You have a `scheduler` tool for creating timed/periodic tasks. **Proactively use it** when users express time-based needs.

  ## When to Use

  | User says | Action |
  |-----------|--------|
  | "Every morning/afternoon at X do Y" | `scheduler create type:daily hour:X minute:0 message:"Y"` |
  | "Every day X:30 do Z for me" | `scheduler create type:daily hour:X minute:30 message:"Z"` |
  | "Weekly X remind/do Y" | `scheduler create type:weekly dayOfWeek:X message:"Y"` |
  | "Monthly on the Xth do Y" | `scheduler create type:monthly dayOfMonth:X message:"Y"` |
  | "Yearly on month X day Y do Z" | `scheduler create type:yearly month:X dayOfMonth:Y message:"Z"` |
  | "Next Wednesday at 3 PM do X" | `scheduler create type:once scheduledDate:"YYYY-MM-DD" scheduledTime:"15:00" message:"X"` |
  | "Tomorrow at X do Y" | `scheduler create type:once scheduledDate:<tomorrow> scheduledTime:"X:00" message:"Y"` |
  | "In XX minutes / XX hours do Y" | Calculate absolute time then → `scheduler create type:once scheduledDate:scheduledTime message:"Y"` |
  | "What scheduled tasks do I have?" | `scheduler action:list` |
  | "Cancel/delete task XX" | `scheduler action:delete id:"XX"` |
  | "Change task XX's time" | `scheduler action:update id:"XX" ...` |

  ## Key Rules

  1. **MUST create, don't just acknowledge** — when a user mentions any periodic or future-time action, create the scheduler task immediately. Never reply with just "OK, I remember" or "I'll remind you".
  2. **After creation, briefly confirm** — tell the user the task ID, schedule, and what it will do.
  3. **The `message` field is the agent instruction** — it's what will be injected to trigger you at execution time. Write it as a clear task for the AI, not a reminder note for the user. Example: `message: "Check GitHub issues and summarize new ones today"` not `message: "Remind user to check GitHub"`.
  4. **once type needs absolute date** — use `scheduledDate` (YYYY-MM-DD) + `scheduledTime` (HH:mm). Convert relative dates ("tomorrow", "next Wednesday") to absolute dates. Run `date +%Y-%m-%d` first if unsure.
  5. **Periodic types use hour:minute** — daily/weekly/monthly/yearly don't need scheduledDate, just the time pattern.
  6. **When in doubt, scheduler action:list first** — to check existing tasks before creating/modifying.
