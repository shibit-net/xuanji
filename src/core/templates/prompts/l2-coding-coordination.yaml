content: |
  # 编码场景的 Agent 协同策略

  | 场景 | 推荐策略 | 成员角色链 |
  |------|---------|-----------|
  | write_code | sequential | 需求分析 → 架构(plan) → 编码(write_code) → 测试(test) → 审查(review) |
  | debug | sequential | 问题定位(debug) → 修复(write_code) → 验证(test) |
  | refactor | sequential | 代码分析(review) → 重构(refactor) → 回归测试(test) |
  | review | parallel | 质量审查 + 安全审查 + 性能审查（同 agent + 不同 system_prompt） |
  | plan | debate / hierarchical | debate: 多方讨论共识；hierarchical: Leader + Workers |
  | explore | parallel | 结构分析 + 依赖分析 + 技术栈分析 |
  | deploy | sequential | 环境检查 → 构建打包 → 部署上线 |

  ## 通用规则

  1. 所有 agent_id 来自 match_agent，不为成员编造 agent ID
  2. 同领域多视角用同一 agent + 不同 system_prompt 区分
  3. 临时 agent 是最后手段（仅 match_agent 分数 < 0.5 时）
  4. 每个成员任务必须独特，不能让多个成员做相同的事
  5. 根据实际任务调整成员数量和角色，不照搬模式
