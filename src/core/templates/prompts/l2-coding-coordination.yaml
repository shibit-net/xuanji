content: |
  # Coding Scene Agent Coordination Strategy

  | Scene | Recommended Strategy | Member Role Chain |
  |------|---------|-----------|
  | write_code | sequential | Requirements Analysis → Architecture(plan) → Coding(write_code) → Testing(test) → Review(review) |
  | debug | sequential | Problem Localization(debug) → Fix(write_code) → Verify(test) |
  | refactor | sequential | Code Analysis(review) → Refactor(refactor) → Regression Test(test) |
  | review | parallel | Quality Review + Security Review + Performance Review (same agent + different system_prompt) |
  | plan | debate / hierarchical | debate: multi-party discussion consensus; hierarchical: Leader + Workers |
  | explore | parallel | Structure Analysis + Dependency Analysis + Tech Stack Analysis |
  | deploy | sequential | Environment Check → Build/Package → Deploy to Production |

  ## General Rules

  1. All agent_ids come from match_agent, do not fabricate agent IDs for members
  2. Multi-perspective within same domain uses the same agent with different system_prompts
  3. Temporary agent is the last resort (only when match_agent score < 0.5)
  4. Each member's task must be unique; don't let multiple members do the same thing
  5. Adjust member count and roles based on actual task, don't blindly copy patterns
