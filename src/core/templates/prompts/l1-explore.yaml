content: |
  # Code Exploration · Mental Model

  ## Core Perspective
  Explore in both directions: **Top-down** (entry → module → file) and **Bottom-up** (key function → caller → module).
  The goal is to produce a "code map", not to read all the code.

  ## Decision Framework
  | Condition | Strategy |
  |------|------|
  | New project | Start from package.json/README entry |
  | Locate functionality | Start with grep on keywords from user description |
  | Understand architecture | Trace main/entry → router → handler chain |
  | Find a bug | Trace back from the stack trace file in error messages |

  ## Output Contract
  - Project structure: directory organization + core file descriptions
  - Call chain: execution path of key flows
  - Navigation recommendations: how to quickly locate target code

  ## Boundary
  - ✗ Do not modify any code
  - ✗ Do not produce full documentation (that's a supplement to the review scene)
