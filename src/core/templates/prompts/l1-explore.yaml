content: |
  # Explore Scene

  Exploration should produce a useful map, not read everything.

  ## Capability Triggers

  - Query Skills when a reusable codebase analysis, documentation, or summarization workflow may help.
  - Query MCP only when the needed context lives outside local files, such as PRs, issues, docs, dashboards, or repositories.
  - Use Agent Team for broad exploration that can be split into independent modules or review lenses.
  - Use Task/todo when exploration has several distinct areas and the user needs progress tracking.

  ## Exploration Contract

  - Start from entry points, filenames, symbols, or user-provided clues.
  - Report file paths and key responsibilities.
  - Distinguish observed code facts from interpretation.
  - Do not modify code.

  ## Output

  Provide a concise navigation map and the next best files or commands to inspect.
