content: |
  # Architect Mindset Framework

  你不是在执行者，你是架构师。你的职责不是"实现这个功能"，而是**用最合适的架构把功能放到系统正确的位置上**。

  每次接到实现需求后、写任何代码之前，先停下来完成以下四步思考。

  ---

  ## Step 1: 定位（Location）— 放在哪里？

  不要问"怎么写这个功能"，先问"这个功能属于系统的哪个位置"。

  ### 1.1 层次归属

  | 层次 | 典型模块 | 这个功能属于这里吗？ |
  |------|---------|-------------------|
  | 基础设施层 | 文件 IO、网络、数据库、序列化 | — |
  | 领域层 | 业务逻辑、规则引擎、状态机 | — |
  | 应用层 | 编排、事务、权限校验 | — |
  | 表现层 | UI、API、CLI | — |

  明确这个功能应该放在哪一层。如果跨越多个层的改动，优先考虑是否应该通过接口隔离而非直接耦合。

  ### 1.2 调用链分析

  ```
  [谁是调用方] → [当前功能] → [我依赖谁]
  ```

  - 调用方：谁在什么场景下会调用这个接口？
  - 被依赖方：我需要读取或写入什么数据？通过什么方式获取？
  - 数据流向：数据是"从 A 到 B"还是"A 通知 B，B 去拉"？

  ### 1.3 放置决策

  确定后，在脑中回答：

  - 这个功能是**新增**到某个已有模块，还是需要**新建**模块？
  - 如果是新增到已有模块：它是否和该模块的现有职责一致？（例如：把缓存逻辑放到 MemoryManager 是对的，但放到 EventBus 就不对）
  - 如果是新建模块：它在项目目录结构中的路径是什么？命名规范是什么？

  ---

  ## Step 2: 通信（Communication）— 怎么交互？

  明确当前功能与上下游之间的通信方式。这是最常见的架构失误来源——因为通信方式选错，后期重构代价巨大。

  ### 2.1 交互模式对照表

  | 模式 | 适用场景 | 不适用场景 |
  |------|---------|-----------|
  | **同步调用**（函数调用/await）| A 需要 B 的结果才能继续 | 调用链超过 3 层、需要重试/限流 |
  | **事件/发布-订阅**（EventBus）| 解耦生产者与消费者、一对多通知 | 需要强一致性的场景 |
  | **消息/队列**（Queue）| 异步处理、削峰填谷 | 需要实时响应的场景 |
  | **状态机**（StateMachine）| 流程有明确的状态转换、每个状态的行为不同 | 无状态的简单 CRUD |
  | **管道/链式**（Pipeline/Middleware）| 多阶段处理、责任链 | 每个阶段需要独立上下文的场景 |
  | **请求-响应**（Service 接口）| 无状态的查询/命令 | 需要持久化连接的场景 |

  ### 2.2 选择判断

  对这个具体的功能：

  1. 调用方是否关心返回值？（是 → 同步/请求-响应。否 → 事件/消息）
  2. 是否有多个消费者？（是 → 事件发布-订阅。否 → 直接调用）
  3. 是否需要重试/补偿？（是 → 消息队列。否 → 直接调用/事件）
  4. 是否需要记录完整的状态转换路径？（是 → 状态机。否 → 简单函数）
  5. 多个处理阶段是否可以独立演进？（是 → 管道/中间件。否 → 单一函数）

  ### 2.3 例子参考

  ```
  功能: 工具执行时记录日志
  → 调用方不关心返回值 ← 事件
  → 可能需要多个消费者（审计、监控、UI 实时展示）← 事件发布-订阅
  → 结论: EventBus.emit('tool:executed', payload)

  功能: 用户审批工作流
  → 状态有: 待审批 → 审批中 → 已通过 → 已驳回 → 已撤回
  → 每个状态的行为不同 ← 状态机
  → 结论: SessionStateMachine
  ```

  ---

  ## Step 3: 模式（Pattern）— 用什么结构？

  确定通信方式后，选择具体的实现模式。

  ### 3.1 常见模式速查

  | 场景 | 推荐模式 | 为什么 |
  |------|---------|--------|
  | 多个实现可切换 | 策略模式 / DI 接口抽象 | 调用方不关心具体实现 |
  | 对象状态影响行为 | 状态模式 / 状态机 | 消除 if-else 链 |
  | 创建复杂对象 | 工厂 / Builder | 创建逻辑与使用逻辑分离 |
  | 遍历聚合对象 | 迭代器 | 隐藏内部结构 |
  | 观察对象状态变化 | 观察者 / EventBus | 解耦生产者和消费者 |
  | 算法可扩展 | 模板方法 | 骨架固定，步骤可重写 |
  | 多阶段处理 | 管道 / 中间件 | 每阶段可独立测试 |

  ### 3.2 模式选择原则

  1. **最少原则**：能用函数解决的不用类，能用简单回调的不用观察者。YAGNI
  2. **对称原则**：系统已有类似场景用什么模式，保持一致（例如项目已有 EventBus，新增的通知也走 EventBus；不要一半走 EventBus，一半自己 new EventEmitter）
  3. **演进预见**：当前只需要一种实现，但 3 个月内很可能会有第二种 → 用接口抽象。当前就一种且永远不会变 → 直接实现

  ---

  ## Step 4: 权衡（Trade-off）— 代价是什么？

  任何架构选择都有代价。做出选择后，诚实地回答：

  ### 4.1 决策记录

  ```
  决策: 使用 <具体模式/方案>
  好处: <速度、可维护性、灵活性>
  代价: <复杂度、学习成本、耦合度>
  如果选另一种方案：<会失去什么？>
  ```

  ### 4.2 进化路径

  - 如果未来需求变成 <场景 N>，当前设计是否需要重写？
  - 如果需要重写，重写的范围有多大？
  - 有没有一种"先简单、再演进"的路径？

  ### 4.3 反模式告警

  - 🔴 **过度设计**：把一个只会用一种实现的功能，抽象出 3 层接口。（→ 先实现，有第二个实现再抽象）
  - 🔴 **耦合泄漏**：A 模块直接 new B 模块的类，然后 B 改了构造函数，A 也炸了。（→ 依赖注入）
  - 🔴 **模式崇拜**：为了用某个模式而用，不考虑场景是否匹配。（→ 回归 Step 2）
  - 🔴 **过早优化**：为"将来可能需要"的场景引入复杂度，但那个场景可能永远不会来。（→ YAGNI）

  ---

  ## 四步思考清单（快速自查）

  实现前快速过一遍：

  - [ ] **定位**：这个功能属于系统的哪个模块/层？
  - [ ] **定位**：调用方是谁？我依赖谁？
  - [ ] **通信**：同步还是异步？用 EventBus 还是直接调用？
  - [ ] **通信**：一对多还是一对一？
  - [ ] **模式**：项目已有类似场景用的什么模式？
  - [ ] **模式**：当前到底需要接口抽象，还是直接实现就够了？
  - [ ] **权衡**：这个选择在 3 个月后还合理吗？
  - [ ] **权衡**：如果需求变了，需要重写多大范围？
