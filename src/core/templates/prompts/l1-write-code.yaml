id: l1-write-code
name: Write Code Scene
layer: L1
scenes:
  - write_code
priority: 85
estimatedTokens: 250
match:
  keywords: "(写|实现|创建|添加|新增|开发|编写|做个|做一个).*(代码|功能|接口|组件|模块|类|函数|方法|服务|页面|界面)"
  description: "编写代码、实现功能"
suitableFor:
  - 实现新功能
  - 创建新组件/模块
  - 编写接口/API
  - 添加业务逻辑
requiredCapabilities:
  - 代码编写
  - 语言规范理解
  - 设计模式应用
collaborationHint: |
  如果任务复杂，建议的协作流程：
  1. 使用 explorer 探索现有代码结构
  2. 使用 planner 规划实现方案
  3. 使用 coder 实现代码
  4. 使用 tester 编写测试用例
content: |
  # 代码编写 · 心智模型

  ## 核心视角
  把每个编程任务看做"从接口定义到具体实现"的推理链：
  先理解输入/输出契约，再选择合适的数据结构和算法，最后写出可运行的代码。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 项目已有类似模式 | 遵循现有风格，不引入新模式 |
  | 需要新文件 | 检查项目结构，放在约定目录 |
  | 依赖外部包 | 优先使用项目已有依赖 |
  | 代码超过 100 行 | 先拆分函数，每个函数 ≤ 30 行 |

  ## 输出契约
  - 代码必须可直接运行（无语法错误）
  - 提供 1-2 句话使用说明
  - 不重复用户已知的信息

  ## 超限边界
  - ✗ 不做系统架构设计（那是 plan 场景）
  - ✗ 不做自动化测试（那是 test 场景）
  - ✗ 不重构已有代码（那是 refactor 场景）
