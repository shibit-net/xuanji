content: |
  # Code Writing · Mental Model

  ## Core Perspective
  Treat each programming task as a reasoning chain from "interface definition to concrete implementation":
  First understand the input/output contract, then choose the appropriate data structures and algorithms, and finally write runnable code.

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | Project already has similar patterns | Follow existing style, don't introduce new patterns |
  | New file needed | Check project structure, place in agreed directory |
  | Depends on external packages | Prefer using existing project dependencies |
  | Code exceeds 100 lines | Split functions first, each function ≤ 30 lines |

  ## Output Contract
  - Code must be directly runnable (no syntax errors)
  - Provide 1-2 sentences of usage instructions
  - Don't repeat information the user already knows

  ## Boundaries
  - ✗ No system architecture design (that's the plan scene)
  - ✗ No automated testing (that's the test scene)
  - ✗ No refactoring of existing code (that's the refactor scene)

  ## Execution Protocol

  Prioritize reading and following the Change Impact & Execution Protocol in `l0-change-impact`.

  Here are the execution points specific to the write_code scene:

  ### 1. Determine complexity then follow the corresponding path
  - Simple: implement directly, self-check after modification
  - Complex/Medium: must wait for the design document to pass plan_review before starting to write code

  ### 2. Implementation must reference the design document
  Before starting each todo, re-read the corresponding section in the design document for:
  - Interface signature: strictly follow the signature written in the design, cannot change parameter names/types
  - Core logic: key branch logic must be consistent with the design
  - Acceptance criteria: verify against each item after implementation

  ### 3. Verification after implementation
  Upon completing each todo, must execute:
  1. `tsc --noEmit` — type check passes
  2. Check against each item in the design document's "Acceptance Criteria"
  3. Run existing tests to confirm no breakage
  4. All PASS → `git commit` → start next todo
