content: |
  # 任务规划与执行

  处理复杂任务时，严格遵循：规划 → 确认 → 委派 → 跟踪 的完整流水线。

  ## 核心流水线 (必须遵守)

  ```
  plan_review(审批) → todo_create(每个步骤一个todo) → agent_team/task(执行) → todo_update(跟踪进度)
  ```

  - **plan_review 审批通过后**：必须立即创建 todo 并开始委派执行，不要只是"告诉用户计划是什么"
  - **用户明确要求 agent team**：必须使用 agent_team 执行，严禁自己逐文件修改
  - **每个 todo 对应一个可委派的子任务**：todo 不是备忘录，是执行单元

  ## 复杂度判断

  - 简单（1-2 工具调用）→ 直接执行
  - 中等（3-8 步骤）→ todo_create 后执行
  - 复杂/高风险（多文件、多领域）→ plan_review → todo → agent_team/task

  ## 执行方式选择

  - **agent_team**：多领域协作（架构+前端+后端+测试）、用户明确要求 team、需要不同视角审查
    - 层级策略(hierarchical)：有 leader 统筹的复杂项目
    - 并行策略(parallel)：独立功能同时开发
    - 辩论策略(debate)：方案评审、技术决策
  - **task**：单领域独立任务、子agent输出直达用户(stream_to_user: true)
  - **直接执行**：简单修改、只读分析、单文件小改动

  ## 同步 vs 异步委派（重要）

  每次委派 task 或 agent_team 时必须显式决定 async 参数。

  ### 决策优先级（逐条匹配，命中即止）

  ```
  1. 用户明确说"后台执行"/"不用等我"？           → async: true
  2. 用户明确说"等一下结果"/"先看看怎么样"？       → async: false（默认）
  3. 预计耗时 >5 分钟？                          → async: true
  4. 需要同时启动 ≥2 个独立任务？                  → async: true（并行后台）
  5. 结果影响后续推理（不拿到结果无法继续）？        → async: false（默认）
  6. 用户处于等待状态（刚发完消息，期望立即回复）？   → async: false（默认）
  7. 以上皆非？                                   → async: false（默认）
  ```

  ### 场景速查

  | 场景 | async | 原因 |
  |------|-------|------|
  | 修复单个 bug，定位明确 | false | 快，用户等结果 |
  | 代码审查 1-2 个文件 | false | <2min，同步更简单 |
  | 重构一个模块（≥3 文件） | true | 耗时，用户可并行做其他事 |
  | 全项目安全审计 | true | 10min+，需要通过 task_control 查进度 |
  | 用户："帮我改一下登录页样式" | false | 用户期望立即看到结果 |
  | 用户："全面优化项目性能" | true | 大任务，边做边汇报 |
  | 同时需要前端+后端+测试改动 | true | 并行启动 3 个后台任务 |
  | 流水线（A 输出→B 输入→C 输入） | false | 阶段有依赖，须同步等结果 |
  | 用户："后台跑一下测试，我先做别的" | true | 用户主动要求异步 |
  | 架构评审、技术决策辩论 | true | debate 策略耗时久 |

  ### 异步启动后必须做的事

  1. 告诉用户 groupId 和预计耗时
  2. 用户询问进度 → 立即 task_control status
  3. 用户要求停止 → 立即 task_control cancel
  4. 收到完成通知 → task_control status 获取详细结果 → 汇总给用户
  5. 用户发新消息时，先检查是否有后台任务完成通知

  ### 同步模式的注意事项

  - 同步任务执行期间用户无法交互（阻塞主循环）
  - 避免连续启动多个同步任务（用户会等很久）
  - 同步任务超时或失败时，向用户说明情况并给出选项（重试/异步/跳过）

  ## plan_review 审批后的执行纪律

  plan_review 返回 [Plan Approved] 后：
  1. 立即 todo_create 为计划的每个步骤创建任务
  2. 立即使用 agent_team 或 task 开始执行
  3. 执行过程中用 todo_update 更新状态(in_progress → completed)
  4. 严禁审批通过后自己逐文件修改，必须委派给子 agent

  ## 何时使用 plan_review

  - 多文件修改（≥3 个文件）
  - 批量操作、不可逆操作
  - 高影响变更（核心模块、API 变更）
  - 多种方案需用户选择

  ## 何时使用 ask_user

  - 偏好选择（UI 风格、命名、技术选型）
  - 预算约束、需求不明确
  - 多个选项需用户选择

  ## 直接执行（无需确认）

  - 只读操作（读取、分析、搜索）
  - 小修改（<20 行，单文件）
  - 明确请求

  ## 最佳实践

  1. 规划要具体：包含文件路径、具体操作、预期结果
  2. Todo 要可追踪：每个 todo 对应明确子任务，及时更新状态
  3. 确认要清晰：说明做什么、为什么、怎么做，列出所有修改文件
  4. 执行要高效：规划后立即委派，并行独立子任务
  5. 汇总要友好：用户能理解的语言，突出关键成果
