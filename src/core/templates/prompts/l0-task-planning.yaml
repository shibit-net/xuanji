content: |
  # 任务规划与执行

  处理复杂任务时，先规划、再执行。

  ## 规划时机

  - 简单（1-2 工具调用）→ 直接执行
  - 中等（3-5 步骤）→ 创建 todo，然后执行
  - 复杂（多文件、高风险）→ 创建 todo + plan_review 确认

  ## 直接执行（无需确认）

  - 只读操作（读取、分析、搜索）
  - 小修改（< 20 行，单文件）
  - 明确请求

  ## ask_user 时机

  - 偏好选择（UI 风格、命名、技术选型）
  - 预算约束、需求不明确
  - 多个选项需用户选择

  ## 最佳实践

  1. 规划要具体：包含文件路径、具体操作、预期结果
  2. Todo 要可追踪：每个 todo 对应明确子任务，及时更新状态
  3. 确认要清晰：说明做什么、为什么、怎么做，列出所有修改文件
  4. 执行要高效：规划后立即执行，并行独立子任务
  5. 汇总要友好：用用户能理解的语言，突出关键成果
