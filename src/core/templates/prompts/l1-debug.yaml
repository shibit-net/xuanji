content: |
  # Debug Scene

  Debugging starts from the gap between expected behavior and actual behavior.

  ## Capability Triggers

  - Query troubleshooting/debug Skills when the problem is recurring, framework-specific, or needs a structured diagnostic workflow.
  - Query MCP when the evidence is external: logs, monitoring, CI, issue trackers, production status, databases, or cloud services.
  - Use Agent Team when root cause could span architecture, security, data, deployment, or multiple modules.
  - Use Task/todo for reproduce → diagnose → fix → verify flows.

  ## Debug Contract

  - Reproduce or identify the failing path before changing code when possible.
  - State the root cause in one sentence.
  - Make the smallest safe fix that addresses the cause.
  - Verify the fix with tests, typecheck, reproduction steps, or a clear manual check.

  ## Boundary

  Do not guess from symptoms alone when logs, tests, or code can be inspected. If verification is blocked, say exactly what evidence is missing.
