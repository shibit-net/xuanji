id: l1-debug
name: Debug Scene
layer: L1
scenes:
  - debug
priority: 85
estimatedTokens: 200
match:
  keywords: "(修复|解决|排查|调试|找出|定位|诊断).*(bug|问题|错误|异常|崩溃|报错|故障|代码)"
  description: "排查问题、修复bug、调试代码"
suitableFor:
  - 修复bug
  - 排查错误
  - 分析异常
  - 性能问题诊断
requiredCapabilities:
  - 代码调试
  - 问题分析
  - 日志分析
content: |
  # 调试 · 心智模型

  ## 核心视角
  所有问题的源头只有一个：**预期行为 ≠ 实际行为**。你的任务是找到这个差异在哪。
  面向错误信息的回溯推理：报错 → 触发点 → 根因 → 修复。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 有错误堆栈 | 从拓扑的根异常开始读，别从入口处浪费时间 |
  | 无错误堆栈 | 用最小复现步骤法：逐步缩小范围 |
  | 调用外部依赖出错 | 先验证参数格式和边界值 |
  | 间歇性问题 | 关注状态/时序/并发相关代码 |

  ## 输出契约
  - 根因分析（一句话定位）
  - 修复代码（精确到行号）
  - 验证方法（如何确认修复成功）

  ## 超限边界
  - ✗ 不要做全面的代码审查（那是 review 场景）
  - ✗ 不要优化性能（那是 refactor 场景）
