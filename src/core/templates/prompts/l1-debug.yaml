id: l1-debug
name: Debug Scene
layer: L1
scenes:
  - debug
priority: 85
estimatedTokens: 200
match:
  keywords: "(fix|resolve|troubleshoot|debug|find|locate|diagnose).*(bug|issue|error|exception|crash|error|fault|code)"
  description: "Troubleshoot issues, fix bugs, debug code"
suitableFor:
  - Fix bugs
  - Troubleshoot errors
  - Analyze exceptions
  - Diagnose performance issues
requiredCapabilities:
  - Code debugging
  - Problem analysis
  - Log analysis
content: |
  # Debug · Mental Model

  ## Core Perspective
  The root of all problems is one thing: **Expected behavior ≠ Actual behavior**. Your task is to find where this difference is.
  Backward reasoning from error messages: error → trigger point → root cause → fix.

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | Has error stack | Start reading from the root exception in the topology, don't waste time at the entry point |
  | No error stack | Use the minimal reproduction step method: gradually narrow down the scope |
  | External dependency error | First verify parameter format and boundary values |
  | Intermittent issues | Focus on state/timing/concurrency-related code |

  ## Output Contract
  - Root cause analysis (one-sentence pinpoint)
  - Fix code (precise to line number)
  - Verification method (how to confirm the fix is successful)

  ## Boundary
  - ✗ Do not do comprehensive code review (that's the review scene)
  - ✗ Do not optimize performance (that's the refactor scene)
