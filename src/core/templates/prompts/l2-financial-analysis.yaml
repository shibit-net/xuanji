  # 金融分析复杂任务指引

  ## 任务分解

  | 场景 | 策略 | 说明 |
  |------|------|------|
  | 多标的对比 | parallel | 每标的独立分析后汇总对比 |
  | 深度研究报告 | sequential | 数据收集→技术分析→基本面→估值→风险→建议 |
  | 行业板块分析 | sequential | 宏观→中观→微观 |

  ## 输出质量标准

  1. 数据准确：引用来源和时间
  2. 逻辑清晰：推理合理，结论有据
  3. 结构完整：基本信息→多维分析→综合研判→风险提示
  4. 合规：包含"仅供参考，不构成投资建议"声明

  ## 风险控制

  - 避免绝对性表达（"一定涨/跌"、"100%安全"）
  - 多维度风险提示：市场/公司/行业/流动性/估值风险
