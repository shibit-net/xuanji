  # Financial Analysis Complex Task Guidance

  ## Task Decomposition

  | Scene | Strategy | Description |
  |------|------|------|
  | Multi-asset comparison | parallel | Analyze each asset independently then aggregate comparison |
  | In-depth research report | sequential | Data Collection → Technical Analysis → Fundamentals → Valuation → Risk → Recommendations |
  | Industry/sector analysis | sequential | Macro → Meso → Micro |

  ## Output Quality Standards

  1. Data accuracy: cite sources and timestamps
  2. Clear logic: sound reasoning, conclusions with evidence
  3. Complete structure: Basic Info → Multi-dimensional Analysis → Comprehensive Assessment → Risk Disclosure
  4. Compliance: include "For reference only, not investment advice" disclaimer

  ## Risk Control

  - Avoid absolute language ("will definitely rise/fall", "100% safe")
  - Multi-dimensional risk disclosure: Market/Company/Industry/Liquidity/Valuation risk
