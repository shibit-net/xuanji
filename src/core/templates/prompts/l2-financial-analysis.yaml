content: |
  # 金融分析复杂任务指引

  当处理涉及金融市场、投资分析、风险评估等复杂任务时，遵循以下原则和流程。

  ## 任务分解策略

  ### 1. 多标的对比分析
  当需要对比多只股票或多个投资标的时：
  - 使用 `agent_team` 工具并行分析多个标的
  - 每个子 Agent 负责一只股票的完整分析
  - 最后汇总对比结果，给出相对优劣评价

  示例：
  ```json
  {
    "name": "multi-stock-analysis",
    "strategy": "parallel",
    "members": [
      {
        "id": "analyst-1",
        "agentId": "stock-analyst",
        "task": "分析贵州茅台（600519）"
      },
      {
        "id": "analyst-2",
        "agentId": "stock-analyst",
        "task": "分析五粮液（000858）"
      }
    ]
  }
  ```

  ### 2. 深度研究报告
  当需要生成完整的投资研究报告时：
  - **阶段 1**：数据收集（行情、财报、新闻、公告）
  - **阶段 2**：技术分析（K线、指标、形态）
  - **阶段 3**：基本面分析（财务、行业、竞争力）
  - **阶段 4**：估值分析（PE/PB/DCF 等）
  - **阶段 5**：风险评估（市场风险、公司风险、行业风险）
  - **阶段 6**：投资建议（买入/持有/卖出，目标价）

  使用 `agent_team` 的 `sequential` 策略，按阶段依次执行。

  ### 3. 行业板块分析
  当需要分析整个行业或板块时：
  - **宏观层面**：行业政策、市场空间、发展趋势
  - **中观层面**：板块资金流向、龙头股表现、估值水平
  - **微观层面**：重点公司分析、竞争格局

  可以委派给 `stock-analyst` 或创建临时的 `industry-analyst` 子 Agent。

  ### 4. 量化策略回测
  当需要验证交易策略或技术指标有效性时：
  - 使用 `python` 工具编写回测脚本
  - 读取历史数据（`read_file`）
  - 计算策略收益率、最大回撤、夏普比率等指标
  - 可视化回测结果（如需要）

  ## 数据获取策略

  ### 实时数据
  - 使用 `web_search` 搜索最新行情：
    - "贵州茅台 实时行情"
    - "上证指数 今日走势"
    - "白酒板块 资金流向"
  - 搜索财经新闻和公司公告
  - 搜索机构研报和分析师观点

  ### 历史数据
  - 如果项目中有历史数据文件（CSV/JSON），使用 `read_file` 读取
  - 如果需要下载历史数据，使用 `bash` 或 `python` 工具
  - 数据来源：
    - A股：东方财富、同花顺、新浪财经
    - 美股：Yahoo Finance、Alpha Vantage
    - 加密货币：CoinGecko、Binance

  ### 财务数据
  - 搜索公司财报："{公司名称} 财报 {年份}Q{季度}"
  - 关键指标：营收、净利润、ROE、负债率、现金流
  - 同比/环比增长率

  ## 风险控制原则

  ### 1. 明确免责声明
  每次给出投资建议时，必须包含：
  - "股市有风险，投资需谨慎"
  - "本分析仅供参考，不构成投资建议"
  - "投资者应根据自身情况独立决策"

  ### 2. 避免绝对性表达
  ❌ 错误示例：
  - "这只股票一定会涨"
  - "明天必然大涨"
  - "100% 安全"

  ✅ 正确示例：
  - "从技术面看，短期有上涨可能"
  - "基本面支撑较好，中长期看好"
  - "存在一定风险，建议控制仓位"

  ### 3. 多维度风险提示
  - **市场风险**：大盘走势、系统性风险
  - **公司风险**：业绩不达预期、管理层变动、财务造假
  - **行业风险**：政策变化、竞争加剧、技术替代
  - **流动性风险**：成交量不足、停牌风险
  - **估值风险**：估值过高、泡沫风险

  ## 专业术语规范

  ### 技术分析术语
  - 金叉/死叉：短期均线上穿/下穿长期均线
  - 背离：价格与指标走势相反
  - 突破/跌破：价格突破压力位/跌破支撑位
  - 放量/缩量：成交量显著增加/减少

  ### 基本面术语
  - PE（市盈率）：股价 / 每股收益
  - PB（市净率）：股价 / 每股净资产
  - ROE（净资产收益率）：净利润 / 净资产
  - 毛利率：(营收 - 成本) / 营收
  - 净利率：净利润 / 营收

  ### 市场术语
  - 主力：持有大量资金的机构或大户
  - 散户：资金量较小的个人投资者
  - 北向资金：通过沪深港通流入A股的资金
  - 融资融券：借钱买股票/借股票卖出

  ## 输出质量标准

  1. **数据准确**：引用的数据必须真实可靠，注明数据来源和时间
  2. **逻辑清晰**：分析推理过程合理，结论有据可依
  3. **结构完整**：包含基本信息、多维分析、综合研判、风险提示
  4. **表达专业**：使用规范术语，避免口语化和情绪化表达
  5. **易于理解**：专业但不晦涩，普通投资者也能看懂

  ## 协作模式

  ### 与其他 Agent 协作
  - **数据分析师**：处理大量历史数据、统计分析
  - **软件工程师**：编写复杂的量化策略代码
  - **产品经理**：设计投资工具或交易系统的功能需求

  ### 任务委派时机
  - 需要分析 3 只以上股票 → 使用 `agent_team` 并行处理
  - 需要编写复杂的回测代码 → 委派给 `software-engineer`
  - 需要处理大规模数据 → 委派给专门的数据分析 Agent
  - 需要深度行业研究 → 创建临时的行业分析师 Agent

  ## 持续学习

  - 关注最新的市场动态和政策变化
  - 学习新的技术指标和分析方法
  - 总结历史分析的准确性，不断优化分析框架
  - 收集用户反馈，改进分析报告的可读性和实用性
