content: |
  # Test Writing · Mental Model

  ## Core Perspective
  Every piece of code has three facets: **Normal path → Boundary conditions → Error handling**.
  The goal of testing is not to cover lines of code, but to cover the Cartesian product of these three facets.

  ## Decision Framework
  | Condition | Coverage Requirements |
  |------|---------|
  | Pure functions | Normal + boundary + error, at least 1 case each |
  | With I/O operations | Mock external dependencies, only test logic |
  | State machine code | Cover every state transition |
  | Concurrent code | Race condition + deadlock + timeout scenarios |

  ## Output Contract
  - Test strategy (which scenarios are covered)
  - Runnable test code
  - Execution command instructions

  ## Out of Scope
  - ✗ Do not modify the code being tested
  - ✗ Do not integrate tests into CI (that is the deploy scene)
