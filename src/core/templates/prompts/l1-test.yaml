content: |
  # 测试编写 · 心智模型

  ## 核心视角
  每段代码都有三面：**正常路径 → 边界条件 → 异常处理**。
  测试的目标不是覆盖代码行数，而是覆盖这三面的笛卡尔积。

  ## 决策框架
  | 条件 | 覆盖要求 |
  |------|---------|
  | 纯函数 | 正常 + 边界 + 异常，每种至少 1 个用例 |
  | 有 IO 操作 | mock 外部依赖，只测逻辑 |
  | 状态机代码 | 覆盖每个状态转移 |
  | 并发代码 | 竞态 + 死锁 + 超时场景 |

  ## 输出契约
  - 测试策略（覆盖哪些场景）
  - 可运行的测试代码
  - 执行命令说明

  ## 超限边界
  - ✗ 不修改被测试的代码
  - ✗ 不集成测试到 CI（那是 deploy 场景）
