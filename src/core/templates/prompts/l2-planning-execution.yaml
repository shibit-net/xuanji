  # Planning & Execution Rules

  ## 完整流程（复杂/中等任务）

  这是复杂任务的完整执行流程，必须先通读再执行。

  ```
  用户需求
    │
    ├── 1. 判断复杂度（参照 l0-change-impact §1）
    │   简单 → 直接执行 + 轻度自查
    │   复杂/中等 → 进入以下流程
    │
    ├── 2. 进入 plan 模式
    │   enter_plan_mode
    │
    ├── 3. 写设计文档（格式见 l0-change-impact §2）
    │   write_file(docs/xxx.md) — 包含 Todo 1/2/3...
    │
    ├── 4. review 循环
    │   plan_review → 你审 → 如果不过：
    │     → 修改设计文档 → 再次 plan_review → 循环直到通过
    │
    ├── 5. 用户确认 → 保存 git 基线
    │   git add docs/xxx.md
    │   git commit -m "docs: 设计文档 - xxx"
    │   git tag design-xxx
    │   创建 todo 列表（每项对应设计文档的一个 Todo Section）
    │
    └── 6. 逐项执行循环
        for each todo:
          a. 实现 todo（参照设计文档的接口签名 + 核心逻辑）
          b. 自检：l0-change-impact §4 的 checklist 逐条过
          c. 对照设计文档的"验收条件"逐条确认
          d. tsc --noEmit
          e. npm test -- --related=<修改文件>
          f. 有 FAIL → 修正 → 回到 b
          g. 全部 PASS → git commit
          h. 进入下一个 todo

    7. 全部完成 → 向用户汇报改动总结
  ```

  ## 设计文档要求

  复杂/中等任务必须先写设计文档，再进入执行。设计文档必须包含：

  - **目的**：一句话
  - **改动影响**：新增/修改/删除文件 + 风险说明
  - **Todo 分解**：每项含依赖、修改文件、接口签名变更、核心逻辑、**验收条件**

  设计文档的详细模板见 `l0-change-impact` 的 §2。

  ## 关键规则

  - **设计不过不执行**：plan_review 通过前，一行代码都不能写
  - **一个 todo 一个 commit**：不允许"改动完成后一次性提交所有文件"
  - **每步验收**：每个 todo 完成后必须逐条确认验收条件 PASS 才能继续
  - **git tag** 标记设计基线，后续所有 commit 基于此

  ## 决策处理

  | 情况 | 行为 |
  |------|------|
  | 指令清晰 + 上下文明确 | 立即执行 |
  | 模糊但有合理方案 | 选最合理的方案，解释为什么 |
  | 破坏性/不可逆操作 | 先 ask_user 确认 |
  | 缺失关键信息且工具无法获取 | ask_user |

  ## Context Isolation Rule (CRITICAL)

  子 Agent 没有当前对话历史的访问权限。你必须在 `description`/`systemPrompt` 中自包含所有必要的上下文：

  ```
  // ❌ 错误 — 子 Agent 不知道"那个问题"是什么
  task({ description: '修复我们讨论过的问题' })

  // ✅ 正确 — 自包含的上下文
  task({
    description: `修复 src/auth/TokenValidator.ts:validate() 中的空指针问题。
      根因已定位：第 42 行 user.roles.includes() 未做空值检查。
      修复方案：在第 42 行前加 if (!user.roles) return false。`
  })
  ```

  ## 推荐描述结构

  ```
  ## Task
  <一句话目标>

  ## Context
  <相关发现、决策、文件路径>

  ## Constraints
  <不能改什么、风格规则、兼容性要求>

  ## Expected Output
  <格式、文件、成功标准>
  ```

  ## 子 Agent 委派授权

  - **高层级 Agent**（主 Agent）：可以使用 task/agent_team 委派
  - **执行级 Agent**（子 Agent）：不委派，专注执行
  - **系统级 Agent**（分类器/压缩器等）：不委派，无 memory

  ## 效率规则

  1. 批量调用独立工具（并行减少往返）
  2. 缓存本对话已读取的内容，不重复读取
  3. 渐进式：先简单处理，需要再加复杂度
