content: |
  # Planning & Execution Rules

  ## Complete Workflow (Complex/Medium Tasks)

  This is the complete execution workflow for complex tasks. Read through it first before executing.

  ```
  User Requirements
    │
    ├── 1. Determine complexity (refer to l0-change-impact §1)
    │   Simple → Direct execution + light self-check
    │   Complex/Medium → Enter the following workflow
    │
    ├── 2. Enter plan mode
    │   enter_plan_mode
    │
    ├── 3. Write design document (format in l0-change-impact §2)
    │   write_file(docs/xxx.md) — includes Todo 1/2/3...
    │
    ├── 4. Review loop
    │   plan_review → you review → if not passed:
    │     → Modify design document → plan_review again → loop until passed
    │
    ├── 5. User confirms → save git baseline
    │   git add docs/xxx.md
    │   git commit -m "docs: Design document - xxx"
    │   git tag design-xxx
    │   Create todo list (each item corresponds to a Todo Section in the design document)
    │
    └── 6. Execute items one by one loop
        for each todo:
          a. Implement todo (reference design document's interface signature + core logic)
          b. Self-check: go through l0-change-impact §4 checklist item by item
          c. Verify against each "Acceptance Criteria" in the design document
          d. tsc --noEmit
          e. npm test -- --related=<modified files>
          f. FAIL → fix → go back to b
          g. All PASS → git commit
          h. Move to next todo

    7. All done → report change summary to user
  ```

  ## Design Document Requirements

  Complex/Medium tasks must first write a design document before execution. The design document must include:

  - **Purpose**: one sentence
  - **Change Impact**: new/modified/deleted files + risk description
  - **Todo Breakdown**: each item includes dependencies, modified files, interface signature changes, core logic, **acceptance criteria**

  Detailed design document template is in `l0-change-impact` §2.

  ## Key Rules

  - **No execution without design**: until plan_review passes, not a single line of code may be written
  - **One todo per commit**: no "commit all files after all changes are done"
  - **Step-by-step verification**: after each todo, must verify acceptance criteria PASS before continuing
  - **git tag** marks the design baseline, all subsequent commits based on this

  ## Decision Handling

  | Situation | Action |
  |------|------|
  | Clear instruction + clear context | Execute immediately |
  | Ambiguous but reasonable options | Choose the most reasonable option, explain why |
  | Destructive/irreversible operation | First ask_user for confirmation |
  | Missing key information and tools can't obtain it | ask_user |

  ## Context Isolation Rule (CRITICAL)

  Sub-agents do not have access to the current conversation history. You must include all necessary context self-contained within the `description`/`systemPrompt`:

  ```
  // ❌ Wrong — sub-agent doesn't know what "that issue" is
  task({ description: 'Fix the issue we discussed' })

  // ✅ Correct — self-contained context
  task({
    description: `Fix null pointer in src/auth/TokenValidator.ts:validate().
      Root cause identified: user.roles.includes() at line 42 lacks null check.
      Fix: add if (!user.roles) return false before line 42.`
  })
  ```

  ## Recommended Description Structure

  ```
  ## Task
  <one-sentence goal>

  ## Context
  <relevant findings, decisions, file paths>

  ## Constraints
  <what not to change, style rules, compatibility requirements>

  ## Expected Output
  <format, files, success criteria>
  ```

  ## Sub-agent Delegation Authorization

  - **High-level Agent** (Main Agent): can use task/agent_team to delegate
  - **Execution-level Agent** (Sub-agent): do not delegate, focus on execution
  - **System-level Agent** (Classifier/Compressor/etc.): do not delegate, no memory

  ## Delegation Execution Discipline

  - After delegation, that task is no longer yours to execute: the sub-agent is working independently; you executing it = duplication + conflict
  - Do not re-delegate the same task; if a restart is needed, use task_control to cancel first
  - The purpose of delegation is parallelization: you should handle other unfinished tasks, or wait for results
  - Don't do it yourself just because it "feels slow" — the sub-agent is already executing

  ## Efficiency Rules

  1. Batch calls to independent tools (parallelize to reduce round trips)
  2. Cache content already read in this conversation, don't re-read
  3. Gradual approach: handle simple things first, add complexity as needed
