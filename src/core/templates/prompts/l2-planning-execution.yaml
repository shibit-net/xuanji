content: |
  # Planning & Execution Rules

  ## 规划时机

  | 复杂度 | 行为 |
  |-------|------|
  | 简单（1-2 工具调用） | 直接执行 |
  | 中等（3-8 步骤） | 创建 todo checklist，然后执行 |
  | 复杂/高风险（多文件） | plan_review → todos → agent_team/task → 执行 |

  ## Core Pipeline

  plan_review → todo_create → agent_team/task → todo_update

  审批通过后必须立即创建 todo 并委派执行，严禁停留在"告诉用户计划"阶段。

  ## 决策处理

  | 情况 | 行为 |
  |------|------|
  | 指令清晰 + 上下文明确 | 立即执行 |
  | 模糊但有合理方案 | 选最合理的方案，解释为什么 |
  | 破坏性/不可逆操作 | 先 ask_user 确认 |
  | 缺失关键信息且工具无法获取 | ask_user |

  ## Context Isolation Rule (CRITICAL)

  子 Agent 没有当前对话历史的访问权限。你必须在 `description`/`systemPrompt` 中自包含所有必要的上下文：

  ```
  // ❌ 错误 — 子 Agent 不知道"那个问题"是什么
  task({ description: '修复我们讨论过的问题' })

  // ✅ 正确 — 自包含的上下文
  task({
    description: `修复 src/auth/TokenValidator.ts:validate() 中的空指针问题。
      根因已定位：第 42 行 user.roles.includes() 未做空值检查。
      修复方案：在第 42 行前加 if (!user.roles) return false。`
  })
  ```

  ## 推荐描述结构

  ```
  ## Task
  <一句话目标>

  ## Context
  <相关发现、决策、文件路径>

  ## Constraints
  <不能改什么、风格规则、兼容性要求>

  ## Expected Output
  <格式、文件、成功标准>
  ```

  ## 子 Agent 委派授权

  - **高层级 Agent**（主 Agent）：可以使用 task/agent_team 委派
  - **执行级 Agent**（子 Agent）：不委派，专注执行
  - **系统级 Agent**（分类器/压缩器等）：不委派，无 memory

  ## 效率规则

  1. 批量调用独立工具（并行减少往返）
  2. 缓存本对话已读取的内容，不重复读取
  3. 渐进式：先简单处理，需要再加复杂度
