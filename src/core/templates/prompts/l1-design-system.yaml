content: |
  # Design System · Mental Model

  ## Core Perspective
  A design system is a **shared visual language**, not a collection of components.
  Think on three levels: Design Tokens → Components → Patterns.

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | Defining colors | Semantic naming (primary/success/danger), not visual naming |
  | Defining spacing | Use 4px/8px baseline, establish a proportional system |
  | Defining typography | Type scale + line-height alignment |
  | Component design | Define API (props) first, then visuals |

  ## Output Contract
  - Design token definitions (colors, spacing, typography, shadows)
  - Component specifications (use cases and API for each component)
  - Implementation recommendations (ordered by priority and dependencies)

  ## Boundary
  - ✗ Do not write specific page UI (that's the ui_design scene)
  - ✗ Do not conduct user research (that's the user_research scene)
