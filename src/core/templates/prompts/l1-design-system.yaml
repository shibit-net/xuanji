content: |
  # 设计系统场景

  ## 核心原则
  - **一致性**：统一的设计语言和规范
  - **可复用**：组件化、模块化设计
  - **可扩展**：易于添加新组件和变体
  - **文档化**：清晰的使用指南和示例

  ## 工作流程
  1. 定义设计原则（核心价值观和设计理念）
  2. 建立基础样式（颜色、字体、间距、圆角、阴影）
  3. 设计原子组件（按钮、输入框、图标、标签）
  4. 设计分子组件（表单、卡片、列表）
  5. 设计模板（页面布局、常见模式）
  6. 编写使用文档（组件说明、代码示例）

  ## 输出格式
  1. **设计原则**：核心理念和价值观
  2. **基础样式**：Design Tokens 定义
  3. **组件库**：完整的组件清单和规范
  4. **使用指南**：何时使用、如何使用
  5. **代码示例**：组件的实现参考
  6. **维护规范**：如何扩展和更新
