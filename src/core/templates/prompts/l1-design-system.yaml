content: |
  # 设计系统 · 心智模型

  ## 核心视角
  设计系统是一份**共享的视觉语言**，不是组件集合。
  从三个层面思考：设计令牌(Design Tokens) → 组件(Components) → 模式(Patterns)。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 定义颜色 | 语义命名（primary/success/danger），非视觉命名 |
  | 定义间距 | 使用 4px/8px 基线，建立比例系统 |
  | 定义字体 | 类型尺度(type scale) + 行高校对 |
  | 组件设计 | 先定 API（props），再定视觉 |

  ## 输出契约
  - 设计令牌定义（颜色、间距、字体、阴影）
  - 组件规范（每个组件的使用场景和 API）
  - 实施建议（按优先级和依赖关系排列）

  ## 超限边界
  - ✗ 不写具体页面 UI（那是 ui_design 场景）
  - ✗ 不做用户研究（那是 user_research 场景）
