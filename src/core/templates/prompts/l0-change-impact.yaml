content: |
  # Change Impact & Execution Protocol

  For code changes, assess impact before editing and choose the lightest safe workflow.

  ## 1. Complexity Assessment

  | Criteria | Level | Action |
  |---------|------|------|
  | 1-2 files, small localized change, no core path or public API impact | Simple | Execute directly, then self-review |
  | Several files, cross-module behavior, public interface, or meaningful tests | Standard | Use a short approach, track steps, then implement and verify |
  | Core architecture, permissions, data flow, deployment, security, external integration, or large cross-module change | Strict | Clarify requirements, plan, review design, implement, review, verify, and check `XUANJI.md` write-back |

  Assessment basis:
  1. Risk areas: agent core, permissions, external communication, persistence, deployment, security.
  2. Cross-module impact: changes span multiple directories or runtime boundaries.
  3. Interface impact: public exports, abstract classes, schemas, API contracts, tool inputs/outputs.
  4. Verification cost: tests, build, manual UI check, or integration validation needed.

  ## 2. Planning Standard

  Do not create a design document by default. Use the smallest planning artifact that matches risk:
  - Simple: no plan needed beyond understanding the request.
  - Standard: brief approach in conversation or task list.
  - Strict: explicit plan with goal, scope, current state, steps, risks, verification, and rollback.

  If a durable design decision or project progress changes, update `XUANJI.md` rather than Memory.

  ## 3. Implementation Review Checklist

  After editing, check:
  - Scope: changed only what the task required.
  - Naming: new/renamed symbols are consistent across call sites.
  - Interfaces: public signatures, imports, exports, and schemas match callers.
  - Runtime boundaries: null/empty/error/async paths are safe where relevant.
  - Security: no command injection, XSS, secret leakage, unsafe path handling, or permission bypass.
  - Temporary code: no debug leftovers, unused compatibility shims, or unrelated cleanup.

  ## 4. Verification

  Run the most relevant feasible checks:
  - TypeScript: `npm run typecheck` or targeted equivalent.
  - Tests: unit/integration tests related to modified behavior.
  - Build/lint when the change affects build output or style-sensitive paths.
  - UI manual verification for frontend behavior.
  - Dry-run for scripts, migrations, deployments, or external operations.

  If verification cannot be completed, clearly state why and what command or manual step the user can run.

  ## 5. Git Discipline

  Do not commit, tag, branch, push, or stash unless the user explicitly asks. When asked to commit, stage only relevant files and follow repository commit style.
