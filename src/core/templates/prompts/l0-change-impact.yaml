content: |
  # Change Impact & Execution Protocol

  This is the fundamental execution contract for handling all code modifications. Any changes (writing code, refactoring, fixing bugs) must follow the process below.

  ---

  ## 1. Automatic Complexity Assessment

  Upon receiving a requirement, immediately assess the complexity level:

  | Criteria | Level | Action |
  |---------|------|------|
  | Change 1-2 files, single file < 30 lines, does not affect core paths | Simple | Execute directly, light self-review |
  | Change 3-8 files, cross-module, affects public interface | Medium | Enter plan flow, needs user confirmation of design |
  | Change > 8 files, involves data flow/permissions/core architecture/multi-system integration | Complex | Same as above, each todo requires plan_review final confirmation |

  Assessment basis (in order of priority):
  1. Risk areas: `src/core/` (agent core), `src/permission/` (permissions), `src/mcp/` (external communication)
  2. Cross-module: changes involve 2+ subdirectories (e.g., modifying both `src/core/` and `src/session/`)
  3. Interface changes: modifying public exports, abstract classes, interface definitions
  4. File count: new + modified > 8

  ---

  ## 2. Design Document Standards

  Complex/medium tasks must produce a design document in the following format:

  ```markdown
  ## Purpose
  <One sentence explaining what problem this feature solves>

  ## Changes Impact
  ### New Files
  - path/to/NewFile.ts (~N lines) — description of purpose

  ### Modified Files
  - path/to/Existing.ts, Lxx-Lyy (~N lines) — what was changed

  ### Deleted Files
  - path/to/Deprecated.ts (if applicable)

  ### Risks
  - Does the change affect core paths: yes/no
  - Whether tests need synchronized updates: yes/no (which test files are affected)
  - Whether database migration is needed: yes/no
  - Backward compatible: yes/no

  ## Todo Breakdown

  Each todo adds the following fields:
  - **Dependencies**: which todos must be completed first
  - **Acceptance Criteria**: verifiable, specific standards

  ### Todo 1: <Title>

  **Dependencies**: Todo N (write "None" if none)
  **Modified Files**: path/to/file.ts, Lxx-Lyy
  **Interface Changes**: (write "None" if signature unchanged)
  **Core Logic**: (pseudocode or key code snippets)
  **Acceptance Criteria**:
  - ...
  ```

  ---

  ## 3. Git Baseline Protection Process

  After the user confirms the design document, follow these steps:

  ```bash
  # Step 1: Ensure workspace is clean
  git status --porcelain
  # If there are uncommitted changes:
  git stash push -m "pre-design-xxx"

  # Step 2: Create feature branch (if applicable)
  git checkout -b feature/xxx

  # Step 3: Commit the design document, tag to mark baseline
  git add docs/xxx.md
  git commit -m "docs: design document - xxx"
  git tag design-xxx
  ```

  All subsequent implementation commits are based on this baseline.

  ---

  ## 4. Cross-File Consistency Checklist (execute after each modification)

  After any modification is complete, perform the following checks in order:

  ### 4.1 Change Scope Verification
  - [ ] Are all modified files within the "modified files" scope of the plan
  - [ ] If files outside the scope need modification, has the design document been updated
  - [ ] Are new files in the expected locations

  ### 4.2 Naming Consistency (critical — most common source of bugs)
  - [ ] All **newly added** function names/variable names/type names/class names in this modification are spelled consistently across the entire diff
  - [ ] For every name **deleted or renamed** in this modification, `grep -r` the entire repo to confirm no residual references
    ```bash
    grep -rn "old_name" src/ --include="*.ts" --include="*.tsx"
    ```

  ### 4.3 Interface Consistency
  - [ ] Every new/modified public function/method signature matches the design document exactly
  - [ ] All callers have been synced updated (for every function whose signature changed, grep all call sites)
  - [ ] import/export is correct (path, named export vs default export)

  ### 4.4 Type Safety
  - [ ] TypeScript compilation passes (`npx tsc --noEmit`), or known type errors are explicitly noted in the design document
  - [ ] Are newly added type definitions consistent across all usage sites
  - [ ] Whether `as any` type assertions are necessary, and whether they can be replaced with more precise types

  ### 4.5 Runtime Boundaries
  - [ ] Null value paths (whether passing `undefined` or `null` would cause a crash)
  - [ ] Empty array/empty string paths
  - [ ] Whether exception/error paths are covered by try-catch
  - [ ] Whether async operations have await or .catch

  ---

  ## 5. Item-by-Item Acceptance Process

  After each todo is completed, the following steps must be performed:

  ```bash
  # 1. Type check
  npx tsc --noEmit

  # 2. Existing tests
  npm test -- --related=<files modified this time>

  # 3. Verify acceptance criteria against the design document one by one
  # (No need to report to the user, but you must go through each one yourself. Mark FAIL for issues, fix them, then recheck)
  ```

  Only proceed to the next todo when **ALL PASS**.

  ---

  ## 6. Commit Standards

  After each todo is completed, a commit is required:

  ```bash
  git add -A
  git commit -m "feat(scope): <one-sentence description, e.g., 'MemoryManager.search integrated with semantic search'>"
  ```

  The scope should be the name of the core module being modified, such as `memory`, `scheduler`, `chat`, `tools`.

  Committing content from multiple todos in a single commit is prohibited — each todo should have its own independent commit for easy rollback and review.
