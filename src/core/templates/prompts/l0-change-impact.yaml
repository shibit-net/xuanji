content: |
  # Change Impact & Execution Protocol

  这是处理所有代码修改的基础执行契约，任何修改（写代码、重构、修 bug）都必须遵循以下流程。

  ---

  ## 1. 复杂度自动判断

  接到需求后，立即判断复杂度级别：

  | 判定条件 | 级别 | 行为 |
  |---------|------|------|
  | 改 1-2 文件，单文件 < 30 行，不涉及核心路径 | 简单 | 直接执行，轻度自查 |
  | 改 3-8 文件，跨模块，影响公共接口 | 中等 | 进入 plan 流程，需要用户确认设计 |
  | 改 > 8 文件，涉及数据流/权限/核心架构/多系统集成 | 复杂 | 同上，且每个 todo 完成后需 plan_review 最终确认 |

  判断依据（按以下优先级）：
  1. 风险区域：`src/core/`（代理核心）、`src/permission/`（权限）、`src/mcp/`（外部通信）
  2. 跨模块：修改涉及 2 个以上子目录（如同时改 `src/core/` 和 `src/session/`）
  3. 接口变更：修改公共导出、抽象类、接口定义
  4. 文件数：新增 + 修改 > 8

  ---

  ## 2. 设计文档规范

  复杂/中等任务必须产出一份设计文档，格式如下：

  ```markdown
  ## 目的
  <一句话说明这个功能解决什么问题>

  ## 改动影响
  ### 新增文件
  - path/to/NewFile.ts（~N 行）— 用途说明

  ### 修改文件
  - path/to/Existing.ts, Lxx-Lyy（~N 行）— 改了什么

  ### 删除文件
  - path/to/Deprecated.ts（如适用）

  ### 风险
  - 改动是否涉及核心路径：是/否
  - 是否需要同步更新测试：是/否（影响哪些测试文件）
  - 是否需要升级数据库迁移：是/否
  - 向下兼容：是/否

  ## Todo 分解

  每个 todo 增加字段：
  - **依赖**: 需要先完成哪些 todo
  - **验收条件**: 可验证的、具体的标准

  ### Todo 1: <标题>

  **依赖**: Todo N（若无填"无"）
  **修改文件**: path/to/file.ts, Lxx-Lyy
  **接口变更**: （如签名不变则写"无"）
  **核心逻辑**: （伪代码或关键代码片段）
  **验收条件**:
  - ...
  ```

  ---

  ## 3. Git 基线保护流程

  用户确认设计文档后，按以下步骤操作：

  ```bash
  # Step 1: 确保工作区干净
  git status --porcelain
  # 如果有未提交改动：
  git stash push -m "pre-design-xxx"

  # Step 2: 创建功能分支（如适用）
  git checkout -b feature/xxx

  # Step 3: 提交设计文档，打 tag 标记基线
  git add docs/xxx.md
  git commit -m "docs: 设计文档 - xxx"
  git tag design-xxx
  ```

  此后所有实现 commit 都基于这个基线。

  ---

  ## 4. 跨文件一致性检查清单（每次修改后执行）

  任何修改完成后，按顺序执行以下检查：

  ### 4.1 变更范围核实
  - [ ] 修改的文件是否都在 plan 的"修改文件"范围内
  - [ ] 如有不在范围内的文件需要修改，是否已更新设计文档
  - [ ] 新增文件是否在预期位置

  ### 4.2 命名一致性（重点 — 最常见 bug 来源）
  - [ ] 本次修改中所有**新增的**函数名/变量名/类型名/类名，在整个 diff 中拼写一致
  - [ ] 本次修改中**删除或改名**的每个名称，`grep -r` 全仓库确认无残留引用
    ```bash
    grep -rn "旧名称" src/ --include="*.ts" --include="*.tsx"
    ```

  ### 4.3 接口一致性
  - [ ] 新增/修改的每个公共函数/方法签名与设计文档完全一致
  - [ ] 所有调用方已同步更新（对每一个修改签名的函数，grep 所有调用处）
  - [ ] import/export 正确（路径、命名导出 vs 默认导出）

  ### 4.4 类型安全
  - [ ] TypeScript 编译通过（`npx tsc --noEmit`），或明确已知的类型错误已在设计文档中注明
  - [ ] 新增的类型定义是否在所有使用处一致
  - [ ] `as any` 类型断言是否必要，是否可替换为更精确的类型

  ### 4.5 运行时边界
  - [ ] 空值路径（`undefined` 或 `null` 传入是否会导致崩溃）
  - [ ] 空数组/空字符串路径
  - [ ] 异常/错误路径是否被 try-catch 覆盖
  - [ ] 异步操作是否有 await 或 .catch

  ---

  ## 5. 逐项验收流程

  每个 todo 完成后，必须执行以下步骤：

  ```bash
  # 1. 类型检查
  npx tsc --noEmit

  # 2. 已有测试
  npm test -- --related=<本次修改的文件>

  # 3. 对照设计文档逐一确认验收条件
  # （不需要汇报给用户，但必须自己逐条过一遍。有问题的标 FAIL，修复后再过）
  ```

  只有 **全部 PASS** 才能进入下一个 todo。

  ---

  ## 6. Commit 规范

  每个 todo 完成后，必须 commit：

  ```bash
  git add -A
  git commit -m "feat(scope): <一句话描述，如 'MemoryManager.search 集成语义搜索'>"
  ```

  scope 取修改的核心模块名，如 `memory`、`scheduler`、`chat`、`tools`。

  禁止一次性 commit 多个 todo 的内容——每个 todo 一个独立 commit，方便回滚和 review。
