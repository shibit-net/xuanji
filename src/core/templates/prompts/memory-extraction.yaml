id: memory-extraction
name: Memory Extraction Scene
layer: L1
internal: true
scenes:
  - memory-extraction
priority: 90
estimatedTokens: 1200
match:
  keywords: "memory extraction extract memory store memory analyze conversation"
  description: "Extract durable long-term information from a conversation and maintain entity/fact/relation memory without storing project progress details"
content: |
  # Memory Extraction Task

  Your task is to extract durable long-term memory from the provided conversation and store it with memory tools.

  ## Process

  ### Step 1: Read the conversation
  Read the full conversation and understand what happened, what the user confirmed, and what should remain useful across sessions.

  ### Step 2: Identify storable information
  Scan for the following categories:

  | Category | Detection | Storage |
  |------|---------|---------|
  | User identity / preference / skill | User mentions their role, preference, knowledge, limitations, or working style | entity(type=user/preference) + user_profile |
  | Project knowledge pointer | Project knowledge location, progress document location, external project index | reference/entity only; detailed project progress belongs in `XUANJI.md` |
  | Technical decision | A choice was made and the reason is durable beyond the current diff | fact(source=agent_discovered, importance>=4) |
  | User correction | User corrects your behavior, style, or factual understanding | fact(source=user_correction, importance=5) |
  | Tool / library / external resource | Durable external resource, platform, dashboard, board, document, or integration | entity(type=reference/tool) + relation |
  | Commitment / plan | User commits to a future action or asks to track a durable plan | topic(type=plan) + time_anchor |
  | Person / team | Key people, teams, roles, or relationships | entity(type=person) + group + group_member |
  | Reusable procedure | Deployment, release, migration, or troubleshooting flow that is reusable outside the current one-off task | episode |
  | Methodology research | User asked to learn/study/research how to perform a task and the conversation produced a reusable method | episode with trigger, method, why, pitfalls, and sources; optional fact for concise decision rules |

  Do not store routine command output, temporary debugging state, git-deducible changes, or concrete project progress details.

  ### Step 3: Deduplicate
  For each candidate, call memory_search first:
  - Same entity and type → update only if the summary changed.
  - Semantically identical entity with a different name → merge or transfer relations.
  - Same fact/topic → update or skip instead of duplicating.
  - Prefer semantic equivalence over exact title/name matching.

  ### Step 4: Store in dependency order
  1. Store entities first.
  2. Store relations after related entities exist.
  3. Store facts/events after their entities are known.
  4. Store topic / time_anchor / user_profile / reference last.

  ### Step 5: Link new memory to existing memory
  Create relations when there is a durable connection:
  - new entity belongs_to existing project/reference
  - new decision affects existing module/concept
  - new topic related_to existing goal
  - new reference used_for existing workflow

  Do not invent weak relations just to make the graph denser.

  ### Step 6: Project progress boundary
  If the conversation includes project work such as coding, bug fixing, refactoring, testing, or deployment:
  - Do not store detailed project progress in Memory.
  - If it should be durable, tell the main agent to check/update the project's `XUANJI.md`.
  - Memory may store only the project progress document pointer, external system index, or user preference that applies across projects.

  ## Principles

  - Durable value first: if unsure whether something is worth long-term memory, skip it unless the user explicitly asked to remember it.
  - Decompose information: one user message may contain multiple independent entities, facts, relations, and topics.
  - Link with intent: relations should represent meaningful durable connections, not incidental co-occurrence.
  - Deduplicate semantically: update existing records instead of creating near-duplicates.
  - Methodology learned from research belongs in Memory first. Do not create or request a Skill unless the user explicitly asks for one.

  ## Result

  When complete, the durable information from the conversation should be stored:
  - entities and relations
  - facts and events
  - project knowledge/progress document pointers when necessary
  - user_profile updates when the user reveals stable self-knowledge
  - topics and time anchors when future tracking is useful

  If there is no durable information to store, output "No durable memory to extract".
