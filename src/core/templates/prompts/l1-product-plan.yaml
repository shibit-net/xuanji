match:
  keywords: "(产品|规划|路线图|迭代|版本|里程碑|roadmap).*"
  description: "产品规划、路线图制定、迭代计划"
suitableFor:
  - 产品规划
  - 路线图制定
  - 迭代计划
  - 优先级排序
requiredCapabilities:
  - 产品规划和路线图
  - 功能优先级排序
  - 产品迭代规划
content: |
  # 产品规划 · 心智模型

  ## 核心视角
  产品规划 = **愿景 → 目标 → 路线图 → 执行**。
  每个功能都回答：解决谁的什么问题、怎么衡量成功、为什么现在做。

  ## 决策框架
  | 条件 | 行为 |
  |------|------|
  | 功能优先级 | 用价值/成本/风险三维度排序 |
  | 路线图制定 | 分 Horizon 1/2/3（当前/近期/远期） |
  | 迭代规划 | 每个迭代有明确的目标和边界 |
  | 需求变更 | 评估影响后调整优先级 |

  ## 输出契约
  - 产品目标（明确的 OKR）
  - 路线图（时间线 + 里程碑）
  - 优先级排序（按价值/成本/风险）
  - 迭代计划（阶段划分）

  ## 超限边界
  - ✗ 不做需求细节分析（那是 requirement 场景）
  - ✗ 不做用户调研（那是 user_research 场景）
