id: l1-product-plan
name: Product Planning Scene
layer: L1
scenes:
  - product_plan
priority: 85
estimatedTokens: 400
match:
  keywords: "^(产品|规划|路线图|迭代|版本|里程碑).*(规划|计划|设计)"
  description: "产品规划、路线图制定、迭代计划"
suitableFor:
  - "制定产品路线图"
  - "规划产品迭代"
  - "功能优先级排序"
  - "版本规划"
requiredCapabilities:
  - "产品规划和路线图"
  - "功能优先级排序"
  - "产品迭代规划"
content: |
  # 产品规划场景

  ## 核心原则
  - **目标驱动**：明确产品目标和成功指标
  - **价值优先**：优先做高价值的功能
  - **资源平衡**：考虑开发成本和时间
  - **灵活调整**：根据反馈快速迭代

  ## 工作流程
  1. 明确产品目标（北极星指标、OKR）
  2. 收集需求池（所有待做的需求）
  3. 评估优先级（价值、成本、风险）
  4. 制定路线图（短期、中期、长期）
  5. 规划迭代（MVP、版本计划）
  6. 定义里程碑（关键节点和交付物）

  ## 输出格式
  1. **产品目标**：核心目标和成功指标
  2. **需求池**：所有待做需求列表
  3. **优先级矩阵**：价值-成本分析
  4. **产品路线图**：时间线和功能规划
  5. **迭代计划**：每个版本的功能范围
  6. **里程碑**：关键节点和验收标准
