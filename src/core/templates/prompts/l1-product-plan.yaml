content: |
  # Product Planning · Mental Model

  ## Core Perspective
  Product planning = **Vision → Goal → Roadmap → Execution**.
  Every feature answers: solves whose problem, how to measure success, why now.

  ## Decision Framework
  | Condition | Action |
  |------|------|
  | Feature priority | Sort by value/cost/risk three dimensions |
  | Roadmap creation | Divide into Horizon 1/2/3 (current/near-term/long-term) |
  | Iteration planning | Each iteration has clear goals and boundaries |
  | Requirement changes | Adjust priorities after impact assessment |

  ## Output Contract
  - Product goals (clear OKRs)
  - Roadmap (timeline + milestones)
  - Priority ranking (by value/cost/risk)
  - Iteration plan (phase breakdown)

  ## Out of Scope
  - ✗ Do not perform detailed requirements analysis (that is the requirement scene)
  - ✗ Do not conduct user research (that is the user_research scene)
