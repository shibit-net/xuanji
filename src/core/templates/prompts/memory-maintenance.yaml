content: |
  # Memory Maintenance Task

  Your task is to maintain the memory database and improve its quality, structure, and usefulness.

  ## Process

  ### Step 1: Global scan
  Use memory_search and memory_stats to understand the current memory graph:
  - entity types and counts
  - facts, events, topics, and references
  - relation density
  - stale, redundant, or low-value areas

  ### Step 2: Entity deduplication and merge
  Identify duplicates with semantic judgment, not only exact matching:
  1. name similarity: exact match, alias, abbreviation, translated name
  2. summary similarity: descriptions refer to the same thing
  3. shared relations: two entities point to the same related objects
  4. co-occurrence patterns: the conversation uses them interchangeably

  Cross-type duplicates are possible. For example, one person may appear as both `user` and `person`, or one project may appear as both `project` and `concept`.

  Merge flow:
  1. Choose the entity with the highest importance as canonical.
  2. Update the canonical summary with useful information from duplicates.
  3. Transfer relations from duplicate entities to the canonical entity.
  4. Delete duplicate entities only after relation transfer succeeds.

  ### Step 3: Relation repair
  Find missing durable relations:
  - facts/events mention entities that are not linked
  - entities clearly belong to the same project, team, workflow, or reference
  - repeated co-occurrence represents a stable relationship, not an incidental mention
  - isolated entities should be connected when a meaningful relation exists

  Do not create weak relations just to increase graph density.

  ### Step 4: Abstraction and consolidation
  Improve structure when repeated low-level records can be summarized:
  - related module/tool entities may need a parent concept
  - multiple similar facts may become one concise fact with stronger evidence
  - repeated behavior patterns may become user_profile instead of many facts
  - related topics may be merged or promoted to a durable goal

  ### Step 5: Cleanup stale or misplaced records

  | Target | Condition | Action |
  |---------|------|------|
  | Low-value fact | importance<=2 and not updated for 90 days | Delete |
  | Stale entity | not updated for 180 days and importance<=2 | Archive by prefixing summary with `[Archived]` |
  | Isolated entity | no relation and not updated for 30 days | Delete if not useful |
  | Expired time anchor | trigger_time passed and no cron_expr | Mark as `[Expired]` |
  | Abandoned topic | long-term no mention and no active relation | status -> abandoned |
  | Project progress mistakenly stored in Memory | Concrete project progress that should live in `XUANJI.md` | Delete or replace with a project document pointer |

  ### Step 6: Correct contradictions
  - Search for facts about the same topic with conflicting conclusions.
  - Prefer the latest user correction when records conflict.
  - Update or delete outdated facts.
  - If an entity summary conflicts with facts, update the summary.

  ### Step 7: Refresh user profile
  - Check user_profile dimensions with repeated evidence.
  - Regenerate concise summaries from related facts and events.
  - Mark low-confidence profile dimensions as pending verification.

  ## Principles

  - Semantic judgment beats mechanical matching.
  - Transfer relations before deleting entities.
  - Clean up carefully: archive when unsure, delete only when clearly low-value or wrong.
  - Keep project progress out of Memory; `XUANJI.md` is the project fact source.
  - Report what changed after maintenance.

  ## Result

  Output a concise maintenance report:

  ```text
  Memory maintenance report
  - Merged X duplicate entities and transferred Z relations
  - Added Y missing durable relations
  - Consolidated N related memory groups
  - Cleaned up Z stale or misplaced records
  - Corrected M contradictory records
  - Refreshed K user profile dimensions
  ```
