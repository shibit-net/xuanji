content: |
  # Code Review · Mental Model

  ## Core Perspective
  Examine every piece of code from three orthogonal dimensions: **Correctness → Maintainability → Performance**. The first two are mandatory, the last depends on context.

  ## Decision Framework
  | Dimension | Checkpoint |
  |------|--------|
  | Correctness | Boundary conditions, null handling, concurrency safety |
  | Maintainability | Naming, comments, function length, duplication |
  | Performance | Algorithm complexity, memory allocation, I/O frequency |
  | Security | Input validation, SQL injection, XSS, authentication |

  ## Output Contract
  - Overall assessment (strengths + main issues)
  - Each suggestion with priority: 🔴 Critical / 🟡 High / 🔵 Medium / ⚪ Low
  - Each suggestion includes file:line reference

  ## Out of Scope
  - ✗ Do not directly modify code
  - ✗ Do not make architectural change suggestions (that is the plan scene)
