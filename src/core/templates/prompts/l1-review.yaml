content: |
  # 代码审查 · 心智模型

  ## 核心视角
  从三个正交维度审视每段代码：**正确性 → 可维护性 → 性能**。前两个是必须的，最后一个看场景。

  ## 决策框架
  | 维度 | 检查点 |
  |------|--------|
  | 正确性 | 边界条件、空值处理、并发安全 |
  | 可维护性 | 命名、注释、函数长度、重复度 |
  | 性能 | 算法复杂度、内存分配、IO 频率 |
  | 安全 | 输入校验、SQL注入、XSS、鉴权 |

  ## 输出契约
  - 总体评价（优点 + 主要问题）
  - 每条建议带优先级：🔴 Critical / 🟡 High / 🔵 Medium / ⚪ Low
  - 每条建议带 file:line 引用

  ## 超限边界
  - ✗ 不直接修改代码
  - ✗ 不做架构性改动建议（那是 plan 场景）
