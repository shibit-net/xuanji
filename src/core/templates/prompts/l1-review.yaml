content: |
  # Review Scene

  Review work through correctness, maintainability, security, and performance.

  ## Capability Triggers

  - Query review/security/test Skills when a reusable checklist, policy, or specialized review workflow may help.
  - Use Agent Team when the review needs independent architecture, security, testing, or domain perspectives.
  - Query MCP when review evidence depends on external systems such as PRs, CI, issues, monitoring, or deployment status.
  - For simple local code review, read the relevant files and review directly.

  ## Review Contract

  - Cite findings with `file:line` references when possible.
  - Prioritize issues by impact: Critical / High / Medium / Low.
  - Distinguish confirmed defects from risks or suggestions.
  - Do not modify code unless the user asks for fixes.

  ## Blockers

  If required evidence is unavailable, state what could not be checked and what command, file, or external system would verify it.
