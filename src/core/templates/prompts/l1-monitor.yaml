id: l1-monitor
name: Monitor Scene
layer: L1
scenes:
  - monitor
priority: 85
estimatedTokens: 400
match:
  keywords: "^(监控|告警|日志|性能|可用性|观测|metrics|logging|tracing).*(系统|服务|应用)"
  description: "系统监控、告警配置、日志分析"
suitableFor:
  - "配置监控系统"
  - "设置告警规则"
  - "分析系统日志"
  - "性能监控"
requiredCapabilities:
  - "系统监控和告警"
  - "性能分析和优化"
  - "故障排查和修复"
content: |
  # 监控运维场景

  ## 核心原则
  - **全面监控**：覆盖应用、系统、网络各层面
  - **及时告警**：问题发生时快速通知
  - **可观测性**：日志、指标、追踪三位一体
  - **预防为主**：通过监控发现潜在问题

  ## 工作流程
  1. 确定监控目标（可用性、性能、错误率）
  2. 选择监控工具（Prometheus、Grafana、ELK）
  3. 配置监控指标（CPU、内存、请求量、响应时间）
  4. 设置告警规则（阈值、通知渠道）
  5. 配置日志收集（结构化日志、日志聚合）
  6. 创建监控面板（可视化展示）

  ## 输出格式
  1. **监控方案**：监控架构和工具选择
  2. **配置文件**：监控和告警配置
  3. **面板设计**：监控指标和可视化
  4. **运维手册**：常见问题处理流程
