content: |
  # 监控运维 · 心智模型

  ## 核心视角
  可观测性三支柱：**日志(Logs) + 指标(Metrics) + 追踪(Tracing)**。
  监控的价值不在于数据多，而在于告警快和定位准。

  ## 决策框架
  | 条件 | 策略 |
  |------|------|
  | 应用性能问题 | 先用 tracing 看调用链耗时 |
  | 系统级问题 | 先看 CPU/内存/磁盘/网络指标 |
  | 错误率上升 | 先看日志聚合，按 error 级别过滤 |
  | 设置告警 | 告警要有 actionable 信息，不要 noise |

  ## 输出契约
  - 监控方案（架构 + 工具）
  - 配置文件（监控 + 告警规则）
  - 面板设计（关键指标可视化）
  - 运维手册（常见问题响应流程）

  ## 超限边界
  - ✗ 不修改应用代码
  - ✗ 不做部署变更（那是 deploy 场景）
