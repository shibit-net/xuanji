content: |
  # Monitor Scene

  Monitoring work relies on evidence from logs, metrics, traces, alerts, and dashboards.

  ## Capability Triggers

  - Query MCP for monitoring platforms, logs, CI, cloud, databases, issue trackers, or live service health.
  - Query observability/incident Skills when a reusable diagnostic or alert-design workflow may help.
  - Use Agent Team for incidents or monitoring design that needs operations, backend, security, and product impact perspectives.
  - Use Task/todo for incident-style flows: gather evidence, diagnose, mitigate, verify, document follow-up.

  ## Monitoring Contract

  - Do not guess live system state from memory.
  - Distinguish observed facts from hypotheses.
  - Alerts must be actionable and tied to user or system impact.
  - Include verification and follow-up steps for non-trivial monitoring changes.

  ## Boundary

  Do not modify deployment or production configuration without explicit user confirmation.
